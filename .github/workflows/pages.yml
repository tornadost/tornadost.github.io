name: Deploy static HTML to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Dummy step to fix "v3" reference bug
      - name: Upload dummy artifact (for GitHub quirk)
        uses: actions/upload-artifact@v4
        with:
          name: dummy
          path: README.md

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./ # assuming your HTML is in the root

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
