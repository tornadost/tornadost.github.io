name: Deploy to GitHub Pages (HTML)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🧼 Compatibility fix for ghost v3 reference
      - name: Upload dummy artifact to satisfy v3 ref
        uses: actions/upload-artifact@v3
        with:
          name: dummy
          path: README.md

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./  # Root of your HTML site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
