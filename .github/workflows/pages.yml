name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Add this only if you build your site from source
      # - name: Build site
      #   run: your-build-command-here

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./ # or ./dist or ./public

      - name: Upload fallback artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ./ # same folder

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
