<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PSS Glow Effect</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* dash‐offset animation */
    @keyframes dash {
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

  <!-- Glow‐effect container -->
  <div class="relative">
    <!-- Static gradient outline -->
    <div
      class="static-gradient-wrapper transition-opacity duration-1000 opacity-0"
      style="width: 200px; height: 100px;"
    >
      <svg width="200" height="100" viewBox="0 0 200 100" fill="none">
        <defs>
          <linearGradient id="pss-static-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7B68EE" stop-opacity="1" />
            <stop offset="50%" stop-color="#7B68EE" stop-opacity="1" />
            <stop offset="100%" stop-color="#3498DB" stop-opacity="1" />
          </linearGradient>
        </defs>
        <text
          x="50%"
          y="60%"
          text-anchor="middle"
          font-family="sans-serif"
          font-size="72"
          font-weight="bold"
          fill="none"
          stroke="url(#pss-static-grad)"
          stroke-width="2"
        >
          PSS
        </text>
      </svg>
    </div>

    <!-- Animated glow + dash -->
    <div class="absolute inset-0 flex justify-center">
      <svg width="200" height="100" viewBox="0 0 200 100" fill="none">
        <defs>
          <filter id="pss-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
          <linearGradient id="pss-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7B68EE" stop-opacity="0.5" />
            <stop offset="50%" stop-color="#7B68EE" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#3498DB" stop-opacity="0.5" />
          </linearGradient>
        </defs>
        <text
          x="50%"
          y="60%"
          text-anchor="middle"
          font-family="sans-serif"
          font-size="72"
          font-weight="bold"
          fill="none"
          stroke="url(#pss-glow-grad)"
          stroke-width="4"
          style="
            filter: url(#pss-glow);
            stroke-dasharray: 150;
            stroke-dashoffset: 150;
            animation: dash 2s linear infinite;
          "
        >
          PSS
        </text>
      </svg>
    </div>
  </div>

  <script>
    // Fade in the static outline on load
    window.addEventListener('DOMContentLoaded', () => {
      const el = document.querySelector('.static-gradient-wrapper');
      setTimeout(() => {
        el.classList.replace('opacity-0', 'opacity-100');
      }, 100);
    });
  </script>
</body>
</html>
