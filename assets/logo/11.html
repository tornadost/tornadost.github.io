<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PSS Neon Logo – Synchronized Ring & Text</title>

  <!-- Pacifico font -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet"/>

  <style>
    /*──────────────────────────────────────────────────*
     *                 CSS VARIABLES                   *
     *──────────────────────────────────────────────────*/
    :root {
      --color-start: #7B68EE;
      --color-mid:   #7B68EE;
      --color-end:   #3498DB;
      --duration:    4s;      /* unified loop time */
      --blur1:       4;       /* glow blur passes */
      --blur2:       6;
      --font-size:   160px;
      --svg-width:   90vw;
    }

    /*──────────────────────────────────────────────────*
     *                  GLOBAL RESET                   *
     *──────────────────────────────────────────────────*/
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; }
    body {
      background: #0c0c0c;
      display:flex; align-items:center; justify-content:center;
      font-family: 'Pacifico', cursive;
      overflow:hidden;
    }

    /*──────────────────────────────────────────────────*
     *                SCAN-LINES OVERLAY               *
     *──────────────────────────────────────────────────*/
    .scanlines {
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size:100% 3px;
      pointer-events:none;
      animation: scanlines .5s steps(2) infinite;
    }
    @keyframes scanlines { to { background-position-y:3px; } }

    /*──────────────────────────────────────────────────*
     *               SVG CONTAINER STYLES              *
     *──────────────────────────────────────────────────*/
    .logo-svg {
      width: var(--svg-width);
      max-width:800px;
      overflow:visible;
    }

    /*──────────────────────────────────────────────────*
     *             GRADIENT & GLOW FILTER              *
     *──────────────────────────────────────────────────*/
    /* gradient stops via inline defs */
    /* glow filter */
    filter#neonGlow feGaussianBlur:first-of-type { stdDeviation:var(--blur1); }
    filter#neonGlow feGaussianBlur:nth-of-type(2) { stdDeviation:var(--blur2); }

    /*──────────────────────────────────────────────────*
     *             TEXT OUTLINE (STATIC)               *
     *──────────────────────────────────────────────────*/
    .outline {
      fill:none;
      stroke:url(#neonGrad);
      stroke-width:2;
      opacity:0;
      transition: opacity 1s ease-out;
    }
    .outline.visible { opacity:1; }

    /*──────────────────────────────────────────────────*
     *            TEXT DRAW + GLOW (ANIMATED)          *
     *──────────────────────────────────────────────────*/
    .draw {
      fill:none;
      stroke:url(#neonGrad);
      stroke-width:6;
      stroke-dasharray:1000;
      stroke-dashoffset:1000;
      filter:url(#neonGlow);
      animation: draw var(--duration) linear infinite;
    }
    @keyframes draw { to { stroke-dashoffset:0; } }

    /*──────────────────────────────────────────────────*
     *            CIRCULAR RING (ANIMATED)             *
     *──────────────────────────────────────────────────*/
    .ring-group {
      transform-origin: center;
      animation: rotate var(--duration) linear infinite;
    }
    .ring-path {
      fill:none;
      stroke:url(#neonGrad);
      stroke-width:3;
      stroke-dasharray:8 8;
      animation: dash var(--duration) linear infinite;
    }
    @keyframes rotate { to { transform:rotate(360deg); } }
    @keyframes dash   { to { stroke-dashoffset:-16; } }

    /*──────────────────────────────────────────────────*
     *        REDUCED-MOTION ACCESSIBILITY             *
     *──────────────────────────────────────────────────*/
    @media (prefers-reduced-motion:reduce) {
      .draw, .ring-group, .scanlines { animation:none; }
      .draw { stroke-dashoffset:0; }
    }
  </style>
</head>
<body>

  <!-- Scan-line overlay -->
  <div class="scanlines"></div>

  <!-- SVG Neon Logo -->
  <svg class="logo-svg"
       viewBox="0 0 800 400"
       preserveAspectRatio="xMidYMid meet"
       role="img"
       aria-labelledby="title desc"
       xmlns="http://www.w3.org/2000/svg">
    <title id="title">PSS Neon Logo</title>
    <desc id="desc">Continuously drawn neon “PSS” with a rotating glow ring.</desc>

    <defs>
      <!-- purple→blue gradient -->
      <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"  stop-color="var(--color-start)"/>
        <stop offset="50%" stop-color="var(--color-mid)"/>
        <stop offset="100%" stop-color="var(--color-end)"/>
      </linearGradient>
      <!-- glow filter -->
      <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="b0"/>
        <feGaussianBlur in="b0" stdDeviation="var(--blur1)" result="b1"/>
        <feGaussianBlur in="b1" stdDeviation="var(--blur2)" result="b2"/>
        <feMerge>
          <feMergeNode in="b2"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- Rotating dashed ring -->
    <g class="ring-group">
      <circle class="ring-path" cx="400" cy="200" r="180"/>
    </g>

    <!-- Static outline beneath -->
    <text class="outline" x="50%" y="45%" font-size="var(--font-size)"
          text-anchor="middle" dominant-baseline="middle">PSS</text>

    <!-- Animated draw + glow -->
    <text class="draw" x="50%" y="45%" font-size="var(--font-size)"
          text-anchor="middle" dominant-baseline="middle">PSS</text>
  </svg>

  <script>
    // Fade in static outline
    window.addEventListener('load', () => {
      document.querySelector('.outline').classList.add('visible');
    });
  </script>
</body>
</html>
