<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PSS Neon Logo</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Pacifico', cursive;
    }

    .neon-text {
      font-size: 120px;
      fill: url(#neon-gradient);
      filter: url(#glow);
    }

    .neon-outline {
      fill: none;
      stroke: url(#neon-gradient);
      stroke-width: 2;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
      80% { opacity: 0.95; }
    }

    svg {
      animation: flicker 3s infinite;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 800 400" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="neon-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ff6ec4"/>
        <stop offset="50%" stop-color="#d16ba5"/>
        <stop offset="100%" stop-color="#00cfff"/>
      </linearGradient>

      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
        <feGaussianBlur in="blur1" stdDeviation="6" result="blur2"/>
        <feMerge>
          <feMergeNode in="blur2"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- Main glow text -->
    <text x="50%" y="55%" text-anchor="middle" class="neon-text">PSS</text>

    <!-- Crisp outline -->
    <text x="50%" y="55%" text-anchor="middle" class="neon-outline">PSS</text>
  </svg>
</body>
</html>
