<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PSS Neon Logo</title>

  <!-- Tailwind CSS (for centering) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Pacifico font for the exact cursive shapes -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #2f2f2f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Flicker animation for subtle life */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.9; }
      80% { opacity: 0.95; }
    }

    svg {
      width: 80vw;
      max-width: 600px;
      animation: flicker 3s infinite;
    }

    text {
      font-family: 'Pacifico', cursive;
      font-size: 200px;
      text-anchor: middle;
      dominant-baseline: middle;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 800 300" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- Neon gradient from pink to blue -->
      <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#FF5ECF"/>
        <stop offset="50%" stop-color="#D16BA5"/>
        <stop offset="100%" stop-color="#00CFFF"/>
      </linearGradient>

      <!-- Thick multi-pass blur for glow -->
      <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
        <feGaussianBlur in="blur1" stdDeviation="6" result="blur2"/>
        <feMerge>
          <feMergeNode in="blur2"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- Glow layer -->
    <text
      x="50%" y="50%"
      fill="url(#neon-grad)"
      filter="url(#neon-glow)"
    >
      PSS
    </text>

    <!-- Crisp outline -->
    <text
      x="50%" y="50%"
      fill="none"
      stroke="url(#neon-grad)"
      stroke-width="2"
    >
      PSS
    </text>
  </svg>
</body>
</html>
