<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CyberBlogX~RK · Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    /* ========== ROOT & RESET ================================================= */
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0 }
    html, body {
      height: 100%;
      width: 100%;
      scroll-behavior: smooth;
      overflow-x: hidden;
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Roboto', sans-serif;
    }
    :root {
      --neon: #0f0;
      --neon-b: #39ff14;
      --bg-dark: #000;
      --bg-light: #111;
      --text: #eee;
      --radius: 8px;
      --speed: .3s;
      --max: 1200px;
      --font-mono: 'Press Start 2P', cursive;
    }
    :root.light {
      --bg-dark: #f5f7fa;
      --bg-light: #fff;
      --text: #191d20;
      --neon: #4c5fd7;
      --neon-b: #7f8cfa;
    }

    /* ─── HEADER & NAVIGATION ───────────────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(6px);
      z-index: 100;
    }
    .navbar {
      max-width: var(--max); margin: 0 auto; padding: 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo a {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      color: var(--neon);
      text-decoration: none;
      text-shadow: 0 0 4px var(--neon);
    }

    /* ─── MUSIC PLAYER (in header) ──────────────────────────────────────────── */
    .music-player {
      display: flex; align-items: center; gap: .5rem;
      margin-left: 2rem; margin-right: auto;
      font-family: var(--font-mono);
      color: var(--neon);
      opacity: .7;
      transition: opacity var(--speed) ease;
    }
    .music-player:hover {
      opacity: .95;
    }
    .music-player button {
      background: transparent; border: none;
      font-size: 1.1rem; cursor: pointer;
      color: var(--neon);
      transition: color var(--speed), text-shadow var(--speed);
    }
    .music-player button:hover {
      color: var(--neon-b);
      text-shadow: 0 0 4px var(--neon-b);
    }
    .music-player input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100px; height: 4px;
      background: var(--neon-b);
      border-radius: 2px; cursor: pointer;
    }
    .music-player input[type="range"]::-webkit-slider-thumb,
    .music-player input[type="range"]::-moz-range-thumb {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--neon);
    }
    .music-player span {
      font-size: 0.8rem; white-space: nowrap;
    }
    #track-info {
      display: inline-block; max-width: 200px;
      font-size: .85rem; line-height: 1;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; vertical-align: middle;
    }
    #track-info .marquee {
      display: inline-block;
      padding-left: 100%;
      animation: scroll-text 20s linear infinite;
    }
    @keyframes scroll-text {
      0%   { transform: translateX(0) }
      100% { transform: translateX(-100%) }
    }

    /* ─── LIGHT THEME ICONS & LINKS ─────────────────────────────────────────── */
    .nav-links {
      list-style: none; display: flex; align-items: center; gap: 1rem;
    }
    .nav-links li { display: block }
    .nav-links a, .nav-links button {
      color: var(--neon); text-decoration: none;
      position: relative; background: none; border: none;
      cursor: pointer; font-family: var(--font-mono);
    }
    .nav-links a::after, .nav-links button::after {
      content: ''; position: absolute;
      bottom: -4px; left: 0; width: 0; height: 2px;
      background: var(--neon-b);
      transition: width var(--speed);
    }
    .nav-links a:hover::after,
    .nav-links button:hover::after { width: 100% }

    /* theme toggle flicker */
    @keyframes flicker {
      0%,18%,22%,25%,53%,57%,100% { opacity:1 }
      20%,24%,55% { opacity:.4 }
    }
    #theme-btn:hover {
      background: transparent !important;
      box-shadow: none !important;
      animation: flicker 1.5s infinite;
    }

    /* ─── HAMBURGER (mobile) ────────────────────────────────────────────────── */
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; }
    .hamburger, .hamburger::before, .hamburger::after {
      width: 28px; height: 3px;
      background: var(--neon);
      display: block; position: relative;
      transition: all var(--speed);
    }
    .hamburger::before, .hamburger::after {
      content: ''; position: absolute; left: 0;
    }
    .hamburger::before { top: -8px }
    .hamburger::after  { top: 8px }
    .hamburger.open {
      transform: rotate(45deg);
    }
    .hamburger.open::before {
      top: 0; transform: rotate(90deg);
    }
    .hamburger.open::after {
      top: 0; opacity: 0;
    }
    @media(max-width: 768px) {
      .nav-toggle { display: block }
      .nav-links {
        display: none; flex-direction: column;
        position: fixed; top: 60px; right: 0;
        width: 200px; height: calc(100% - 60px);
        background: var(--bg-light);
        padding: 2rem;
      }
      .nav-links.show { display: flex }
      .nav-links li { margin: 1rem 0 }
    }

    /* ==== PROGRESS BAR UNDER HEADER ==== */
    #progress-container {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 4px;
      background: var(--bg-light);
    }
    #progress-bar {
      width: 0%; height: 100%;
      background: var(--neon);
    }

    /* ========== POST LAYOUT ================================================== */
    .post-content {
      max-width: 800px;
      margin: 100px auto 2rem auto;
      line-height: 1.6;
      padding: 0 1rem;
    }
    .post-content h2,
    .post-content h3,
    .post-content h4 { margin-top: 2rem }
    .post-content h1 {
      font-family: var(--font-mono);
      color: #d1e0f3;
      margin-bottom: 1rem;
    }

    /* ========== BACK TO TOP ================================================== */
    #top {
      position: fixed; right: 1rem; bottom: 1rem;
      width: 48px; height: 48px;
      background: var(--neon-b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0; visibility: hidden;
      transition: opacity var(--speed), visibility var(--speed);
      z-index: 1000;
    }
    #top.visible {
      opacity: 1; visibility: visible;
    }
    #top svg {
      width: 24px; height: 24px; fill: var(--bg-dark);
    }
  </style>
</head>

<body>

  <!-- ========= HEADER ========= -->
  <header>
    <nav class="navbar flex just-between">
      <div class="logo">
        <a href="/feed/blog">CyberBlogX~RK</a>
      </div>

      <!-- ========== MUSIC PLAYER ========== -->
      <div class="music-player">
        <button id="prev-btn" aria-label="Previous Track">⏮</button>
        <button id="play-btn" aria-label="Play/Pause">▶️</button>
        <button id="next-btn" aria-label="Next Track">⏭</button>

        <span id="current-time">0:00</span>
        <input type="range" id="seek-bar" min="0" max="100" value="0">
        <span id="duration">0:00</span>

        <button id="mute-btn" aria-label="Mute">🔊</button>
        <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="0.7">

        <span id="track-info">
          <span class="marquee">Loading playlist…</span>
        </span>
        <audio id="audio-player" preload="auto"></audio>
      </div>

      <!-- ========== NAV LINKS ========== -->
      <ul class="nav-links">
        <li><a href="/layer/redacted.html" aria-label="Home">🏠</a></li>
        <li><a id="theme-btn" href="#" aria-label="Toggle Theme">💡</a></li>
        <li><a href="#contact" aria-label="Contact">📧</a></li>
      </ul>

      <!-- mobile menu toggle -->
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span class="hamburger"></span>
      </button>
    </nav>
    <div id="progress-container"><div id="progress-bar"></div></div>
  </header>

  <!-- ========= POST CONTENT ========= -->
  <article class="post-content container">
    <h1 id="title">Loading…</h1>
    <div id="body">Please wait.</div>

    <!-- optional video -->
    <section id="video-section" style="display:none; margin-top:2rem;">
      <h2></h2>
      <iframe
        id="video-frame" width="560" height="315"
        src="" frameborder="0"
        allow="encrypted-media; fullscreen" allowfullscreen>
      </iframe>
    </section>

    <!-- optional background audio -->
    <section id="audio-section" style="display:none; margin-top:2rem;">
      <h2></h2>
      <audio
        id="bg-audio" controls autoplay loop muted
        style="width:80%; margin-top:.5rem;">
        <source src="" type="audio/flac">
        Your browser does not support HTML5 Audio.
      </audio>
    </section>
  </article>

  <!-- ========= BACK TO TOP ========= -->
  <div id="top" title="Back to top">
    <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg>
  </div>

  <!-- ========= SCRIPTS ========= -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    /* THEME TOGGLE */
    const root = document.documentElement;
    let theme = localStorage.getItem('theme') || 'dark';
    function applyTheme(){
      root.classList.toggle('light', theme==='light');
      localStorage.setItem('theme', theme);
    }
    applyTheme();
    document.getElementById('theme-btn').addEventListener('click', e=>{
      e.preventDefault();
      theme = theme==='dark'?'light':'dark';
      applyTheme();
    });

    /* MOBILE NAV */
    document.querySelector('.nav-toggle').addEventListener('click', ()=>{
      document.querySelector('.nav-links').classList.toggle('show');
      document.querySelector('.hamburger').classList.toggle('open');
    });

    /* BACK TO TOP */
    const topBtn = document.getElementById('top');
    window.addEventListener('scroll', ()=>{
      topBtn.classList.toggle('visible', window.scrollY>300);
    });
    topBtn.addEventListener('click', ()=>window.scrollTo({top:0,behavior:'smooth'}));

    /* AUDIO + MUSIC PLAYER */
    const audio      = document.getElementById('audio-player');
    const playBtn    = document.getElementById('play-btn');
    const prevBtn    = document.getElementById('prev-btn');
    const nextBtn    = document.getElementById('next-btn');
    const trackInfo  = document.getElementById('track-info');
    const currentTimeElem = document.getElementById('current-time');
    const durationElem    = document.getElementById('duration');
    const seekBar         = document.getElementById('seek-bar');
    const muteBtn         = document.getElementById('mute-btn');
    const volumeBar       = document.getElementById('volume-bar');
    const progressBar     = document.getElementById('progress-bar');

    let playlist = [], idx=0, playing=false;

    // Load playlist.json
    fetch('/assets/playlist/playlist.json')
      .then(r=>r.json())
      .then(data=>{
        playlist = data;
        if(playlist.length) loadTrack(0);
        else trackInfo.textContent='No tracks';
      })
      .catch(()=> trackInfo.textContent='Playlist error');

    function loadTrack(i){
      const t = playlist[i];
      audio.src = t.url;
      trackInfo.innerHTML = `<span class="marquee">${t.title} — ${t.artist}</span>`;
      idx = i;
    }
    function togglePlay(){
      if(!playlist.length) return;
      playing? audio.pause() : audio.play();
    }
    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', ()=>{
      idx = (idx-1+playlist.length)%playlist.length;
      loadTrack(idx); audio.play();
    });
    nextBtn.addEventListener('click', ()=>{
      idx = (idx+1)%playlist.length;
      loadTrack(idx); audio.play();
    });
    audio.addEventListener('play', ()=>{
      playing=true; playBtn.textContent='❚❚';
    });
    audio.addEventListener('pause', ()=>{
      playing=false; playBtn.textContent='▶️';
    });
    audio.addEventListener('ended', ()=> nextBtn.click());

    audio.addEventListener('loadedmetadata', ()=>{
      durationElem.textContent = formatTime(audio.duration);
      seekBar.max = Math.floor(audio.duration);
    });
    audio.addEventListener('timeupdate', ()=>{
      const t = Math.floor(audio.currentTime);
      currentTimeElem.textContent = formatTime(t);
      seekBar.value = t;
      progressBar.style.width = (audio.currentTime/audio.duration*100)+'%';
    });
    seekBar.addEventListener('input', ()=> audio.currentTime = seekBar.value );
    muteBtn.addEventListener('click', ()=>{
      audio.muted = !audio.muted;
      muteBtn.textContent = audio.muted? '🔇':'🔊';
    });
    volumeBar.addEventListener('input', ()=>{
      audio.volume = volumeBar.value;
      if(audio.muted && audio.volume>0) audio.muted=false;
      muteBtn.textContent = audio.muted? '🔇':'🔊';
    });
    function formatTime(sec){
      const m = Math.floor(sec/60), s = String(Math.floor(sec%60)).padStart(2,'0');
      return `${m}:${s}`;
    }

    /* LOAD POST CONTENT + VIDEO/AUDIO */
    marked.setOptions({ gfm:true, headerIds:true, mangle:false });
    const slug = window.location.pathname.match(/\/([^\/]+)\.html$/)?.[1];
    if(!slug){
      document.getElementById('body').textContent='Invalid URL';
    } else {
      fetch(`./${slug}.json`)
        .then(r=>r.json())
        .then(j=>{
          // title
          document.getElementById('title').textContent = j.title;
          // body
          if(j.markdown){
            fetch(`./${slug}.md`)
              .then(r=>r.text())
              .then(md=> document.getElementById('body').innerHTML = marked.parse(md))
              .catch(()=>{/* ignore */});
          } else {
            document.getElementById('body').innerHTML = j.content||'';
          }
          // video
          if(j.video_url){
            document.getElementById('video-frame').src = j.video_url;
            document.getElementById('video-section').style.display = 'block';
          }
          // background audio
          if(j.audio_url){
            document.getElementById('bg-audio').src = j.audio_url;
            document.getElementById('audio-section').style.display = 'block';
          }
        })
        .catch(()=> document.getElementById('body').textContent='Post not found.');
    }
  </script>
</body>
</html>
