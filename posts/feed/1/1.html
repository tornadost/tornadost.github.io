<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CyberBlogX~RK · Post</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap"
    rel="stylesheet"
  >
  <style>
    /* ========== ROOT & RESET ================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      scroll-behavior: smooth; overflow-x: hidden;
      background: var(--bg-dark); color: var(--text);
      font-family: 'Roboto', sans-serif;
    }
    :root {
      --neon: #0f0;
      --neon-b: #39ff14;
      --bg-dark: #000;
      --bg-light: #111;
      --text: #eee;
      --radius: 8px;
      --speed: .3s;
      --max: 1200px;
      --font-mono: 'Press Start 2P', cursive;
    }
    :root.light {
      --bg-dark: #f5f7fa;
      --bg-light: #ffffff;
      --text: #191d20;
      --neon: #4c5fd7;
      --neon-b: #7f8cfa;
    }

    /* ========== MUSIC PLAYER (in header) ==================================== */
    .music-player {
      display: flex; align-items: center; gap: .5rem;
      margin-left: 2rem; margin-right: auto;
      font-family: var(--font-mono); color: var(--neon);
      opacity: .7; transition: opacity var(--speed) ease;
    }
    .music-player:hover { opacity: .95; }
    .music-player button {
      background: transparent; border: none;
      font-size: 1.1rem; cursor: pointer;
      color: var(--neon);
      transition: color var(--speed), text-shadow var(--speed);
    }
    .music-player button:hover {
      color: var(--neon-b);
      text-shadow: 0 0 4px var(--neon-b);
    }
    .music-player span {
      font-size: .8rem; white-space: nowrap;
    }
    .music-player input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100px; height: 4px;
      background: var(--neon-b); border-radius: 2px;
      cursor: pointer;
    }
    .music-player input[type="range"]::-webkit-slider-thumb,
    .music-player input[type="range"]::-moz-range-thumb {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--neon); cursor: pointer;
    }
    #track-info {
      display: inline-block; max-width: 200px;
      overflow: hidden; white-space: nowrap;
      vertical-align: middle;
    }
    #track-info .marquee {
      display: inline-block; padding-left: 100%;
      animation: scroll-text 20s linear infinite;
    }
    @keyframes scroll-text {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* ========== UTILITIES ==================================================== */
    .container { max-width: var(--max); margin: 0 auto; padding: 1rem; }
    .flex { display: flex; align-items: center; }
    .just-between { justify-content: space-between; }
    .btn {
      display: inline-block;
      font-family: var(--font-mono);
      text-transform: uppercase;
      padding: .7rem 1.4rem;
      border: 1px solid var(--neon);
      color: var(--neon);
      background: transparent;
      border-radius: var(--radius);
      letter-spacing: .05em;
      transition: background var(--speed), color var(--speed), box-shadow var(--speed);
      margin-left: 1rem;
    }
    .btn:hover {
      background: var(--neon);
      color: var(--bg-dark);
      box-shadow: 0 0 8px var(--neon), 0 0 16px var(--neon-b);
    }
    .btn.neon-flicker { animation: flicker 1.5s infinite; }
    @keyframes flicker {
      0%,18%,22%,25%,53%,57%,100% { opacity:1; }
      20%,24%,55% { opacity:0.4; }
    }

    /* ========== HEADER ======================================================= */
    header {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(6px);
      z-index: 100;
    }
    .navbar {
      max-width: var(--max); margin: 0 auto; padding: 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo a {
      font-family: var(--font-mono); font-size: 1.5rem;
      color: var(--neon); text-decoration: none;
      text-shadow: 0 0 4px var(--neon);
    }
    .nav-links {
      list-style: none; display: flex; align-items: center; gap: 1rem;
    }
    .nav-links a, .nav-links button {
      color: var(--neon); text-decoration: none;
      position: relative; background: none; border: none;
      cursor: pointer; font-family: var(--font-mono);
    }
    .nav-links a::after, .nav-links button::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 2px; background: var(--neon-b);
      transition: width var(--speed);
    }
    .nav-links a:hover::after, .nav-links button:hover::after {
      width: 100%;
    }
    #theme-btn {
      position: relative;
    }
    #theme-btn:hover {
      background: transparent !important;
      color: var(--neon) !important;
      box-shadow: none !important;
      animation: flicker 1.5s infinite;
    }
    #theme-btn:hover::after { width: 100%; }

    .nav-toggle { display: none; background: none; border: none; cursor: pointer; }
    .hamburger, .hamburger::before, .hamburger::after {
      width: 28px; height: 3px; background: var(--neon);
      display: block; position: relative; transition: all var(--speed);
    }
    .hamburger::before, .hamburger::after { content: ''; position: absolute; left: 0; }
    .hamburger::before { top: -8px; } .hamburger::after { top: 8px; }
    .hamburger.open { transform: rotate(45deg); }
    .hamburger.open::before {
      top: 0; transform: rotate(90deg);
    }
    .hamburger.open::after { top: 0; opacity: 0; }

    @media(max-width: 768px) {
      .nav-toggle { display: block; }
      .nav-links {
        display: none; flex-direction: column;
        position: fixed; top: 60px; right: 0;
        width: 200px; height: calc(100% - 60px);
        background: var(--bg-light); padding: 2rem;
      }
      .nav-links.show { display: flex; }
      .nav-links li { margin: 1rem 0; }
    }

    /* ==== PROGRESS BAR UNDER HEADER ==== */
    #progress-container {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 4px;
      background: var(--bg-light);
    }
    #progress-bar {
      width: 0%; height: 100%; background: var(--neon);
    }

    /* ========== POST LAYOUT ================================================== */
    .post-content {
      max-width: 800px;
      margin: 100px auto 2rem auto;
      line-height: 1.6;
      padding: 0 1rem;
    }
    .post-content h2, .post-content h3, .post-content h4 {
      margin-top: 2rem;
    }
    .post-content h1 {
      font-family: var(--font-mono);
      color: var(--neon-b);
      margin-bottom: 1rem;
    }

    /* ========== BACK TO TOP ================================================== */
    #top {
      position: fixed; right: 1rem; bottom: 1rem;
      width: 48px; height: 48px;
      background: var(--neon-b); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0; visibility: hidden;
      transition: opacity var(--speed), visibility var(--speed);
      z-index: 1000;
    }
    #top.visible { opacity: 1; visibility: visible; }
    #top svg { width: 24px; height: 24px; fill: var(--bg-dark); }
  </style>

  <!-- Marked.js for Markdown rendering + header-ID support -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    marked.setOptions({
      gfm: true,
      headerIds: true,
      headerPrefix: '',
      mangle: false
    });
  </script>
</head>
<body>
  <!-- HEADER -->
  <header>
    <nav class="navbar">
      <div class="logo">
        <a href="/feed/blog">CyberBlogX~RK</a>
      </div>

      <!-- music player -->
      <div class="music-player">
        <button id="prev-btn" aria-label="Previous">⏮</button>
        <button id="play-btn" aria-label="Play/Pause">▶️</button>
        <button id="next-btn" aria-label="Next">⏭</button>
        <span id="current-time">0:00</span>
        <input type="range" id="seek-bar" min="0" max="100" value="0">
        <span id="duration">0:00</span>
        <button id="mute-btn" aria-label="Mute">🔊</button>
        <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="0.7">
        <span id="track-info">
          <span class="marquee">Loading playlist…</span>
        </span>
        <audio id="audio-player" preload="auto"></audio>
      </div>

      <ul class="nav-links">
        <li><a href="/feed/blog">Index</a></li>
        <li>
          <button id="theme-btn" class="btn" title="Toggle Light/Dark">💡</button>
        </li>
        <li><a href="mailto:contact@rkeaves.online">🏠</a></li>
        <li><a href="mailto:contact@rkeaves.online">📧</a></li>
      </ul>

      <button class="nav-toggle" aria-label="Toggle navigation">
        <span class="hamburger"></span>
      </button>
    </nav>
    <div id="progress-container"><div id="progress-bar"></div></div>
  </header>

  <!-- MAIN CONTENT -->
  <article class="post-content container">
    <h1 id="title">Loading…</h1>
    <div id="body">Please wait.</div>

    <!-- Featured Video -->
    <section id="video-section" style="display:none; margin-top:2rem;">
      <h2>Featured Video</h2>
      <iframe
        id="video-frame" width="560" height="315"
        src="" frameborder="0"
        allow="encrypted-media; fullscreen" allowfullscreen>
      </iframe>
    </section>

    <!-- Background Audio -->
    <section id="audio-section" style="display:none; margin-top:2rem;">
      <h2>Background Audio</h2>
      <audio id="bg-audio" controls autoplay loop muted style="width:100%; margin-top:.5rem;">
        <source src="" type="audio/flac">
        Your browser does not support HTML5 Audio.
      </audio>
    </section>
  </article>

  <!-- BACK TO TOP -->
  <div id="top" title="Back to top">
    <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg>
  </div>

  <script>
    // THEME TOGGLE
    const root = document.documentElement;
    let theme = localStorage.getItem('theme') || 'dark';
    const applyTheme = () => {
      root.classList.toggle('light', theme==='light');
      localStorage.setItem('theme', theme);
    };
    applyTheme();
    document.getElementById('theme-btn').addEventListener('click', e => {
      e.preventDefault();
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme();
    });

    // MOBILE NAV
    document.querySelector('.nav-toggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('show');
      document.querySelector('.hamburger').classList.toggle('open');
    });

    // BACK TO TOP
    const topBtn = document.getElementById('top');
    window.addEventListener('scroll', () => {
      topBtn.classList.toggle('visible', window.scrollY > 300);
    });
    topBtn.addEventListener('click', () =>
      window.scrollTo({ top: 0, behavior: 'smooth' })
    );

    // AUDIO PLAYER CONTROLS
    const audio = document.getElementById('audio-player'),
          playBtn = document.getElementById('play-btn'),
          prevBtn = document.getElementById('prev-btn'),
          nextBtn = document.getElementById('next-btn'),
          info    = document.getElementById('track-info'),
          currT   = document.getElementById('current-time'),
          durT    = document.getElementById('duration'),
          seek    = document.getElementById('seek-bar'),
          muteBtn = document.getElementById('mute-btn'),
          volume  = document.getElementById('volume-bar');

    let playlist = [], current = 0, playing = false;

    // Load playlist.json
    fetch('/assets/playlist/playlist.json')
      .then(r => r.json())
      .then(json => {
        playlist = json;
        if (playlist.length) loadTrack(0);
      })
      .catch(err => { info.textContent = 'Could not load playlist'; });

    function loadTrack(i) {
      const t = playlist[i];
      audio.src = t.url;
      info.innerHTML = `<span class="marquee">${t.title} — ${t.artist}</span>`;
      current = i;
    }

    function togglePlay() {
      if (!playlist.length) return;
      playing ? audio.pause() : audio.play();
    }
    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', () => {
      current = (current - 1 + playlist.length) % playlist.length;
      loadTrack(current); audio.play();
    });
    nextBtn.addEventListener('click', () => {
      current = (current + 1) % playlist.length;
      loadTrack(current); audio.play();
    });

    audio.addEventListener('play', () => {
      playing = true; playBtn.textContent = '❚❚';
    });
    audio.addEventListener('pause', () => {
      playing = false; playBtn.textContent = '▶️';
    });
    audio.addEventListener('ended', () => nextBtn.click());

    // Seek, timers & volume
    audio.addEventListener('loadedmetadata', () => {
      durT.textContent = formatTime(audio.duration);
      seek.max = Math.floor(audio.duration);
    });
    audio.addEventListener('timeupdate', () => {
      currT.textContent = formatTime(audio.currentTime);
      seek.value = Math.floor(audio.currentTime);
      // Progress bar under header
      const p = (audio.currentTime / audio.duration) * 100;
      document.getElementById('progress-bar').style.width = p + '%';
    });
    seek.addEventListener('input', () => audio.currentTime = seek.value);
    muteBtn.addEventListener('click', () => {
      audio.muted = !audio.muted;
      muteBtn.textContent = audio.muted ? '🔇' : '🔊';
    });
    volume.addEventListener('input', () => {
      audio.volume = volume.value;
      if (audio.muted && audio.volume > 0) audio.muted = false;
      muteBtn.textContent = audio.muted ? '🔇' : '🔊';
    });
    function formatTime(s) {
      const m = Math.floor(s/60), sec = String(Math.floor(s%60)).padStart(2,'0');
      return `${m}:${sec}`;
    }

    // LOAD POST + Markdown + Media
    const match = window.location.pathname.match(/\/(\d+)\/\1\.html$/);
    if (match) {
      fetch(`./${match[1]}.json`)
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(j => {
          document.getElementById('title').textContent = j.title;
          if (j.markdown) {
            fetch(`./${match[1]}.md`)
              .then(r => r.ok ? r.text() : Promise.reject())
              .then(md => document.getElementById('body').innerHTML = marked.parse(md))
              .catch(() => document.getElementById('body').textContent = 'Content not found.');
          } else {
            document.getElementById('body').innerHTML = j.content || '';
          }
          if (j.video_url) {
            document.getElementById('video-frame').src = j.video_url;
            document.getElementById('video-section').style.display = 'block';
          }
          if (j.audio_url) {
            document.getElementById('bg-audio').src = j.audio_url;
            document.getElementById('audio-section').style.display = 'block';
            document.getElementById('bg-audio').play().catch(() => {});
          }
        })
        .catch(() => document.getElementById('body').textContent = 'Post not found.');
    } else {
      document.getElementById('body').textContent = 'Invalid post URL';
    }
  </script>
</body>
</html>
