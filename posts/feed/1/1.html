<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CyberBlogX~RK · Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    /* ========== ROOT & RESET ================================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      width: 100%;
      scroll-behavior: smooth;
      overflow-x: hidden;
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Roboto', sans-serif;
    }
    :root {
      --neon: #0f0;
      --neon-b: #39ff14;
      --bg-dark: #000;
      --bg-light: #111;
      --text: #eee;
      --radius: 8px;
      --speed: .3s;
      --max: 1200px;
      --font-mono: 'Press Start 2P', cursive;
    }
    :root.light {
      --bg-dark: #f5f7fa;
      --bg-light: #fff;
      --text: #191d20;
      --neon: #4c5fd7;
      --neon-b: #7f8cfa;
    }
  
    /* ========== UTILITIES ==================================================== */
    .container { max-width: var(--max); margin: 0 auto; padding: 1rem; }
    .flex { display: flex; align-items: center; }
    .just-between { justify-content: space-between; }
    .btn {
      display: inline-block;
      font-family: var(--font-mono);
      text-transform: uppercase;
      padding: .7rem 1.4rem;
      border: 1px solid var(--neon);
      color: var(--neon);
      background: transparent;
      border-radius: var(--radius);
      letter-spacing: .05em;
      transition: background var(--speed), color var(--speed), box-shadow var(--speed);
    }
    .btn:hover {
      background: var(--neon);
      color: var(--bg-dark);
      box-shadow: 0 0 8px var(--neon), 0 0 16px var(--neon-b);
    }
  
    /* ========== HEADER & NAVIGATION ========================================== */
    header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background: rgba(0, 0, 0, .8);
      backdrop-filter: blur(6px);
      z-index: 100;
    }
    .navbar {
      max-width: var(--max);
      margin: 0 auto;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo a {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      color: var(--neon);
      text-decoration: none;
      text-shadow: 0 0 4px var(--neon);
    }
    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-links li { display: block; }
    .nav-links a, .nav-links button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: var(--neon);
      background: none;
      border: none;
      font-family: var(--font-mono);
      font-size: 1.2rem;
      cursor: pointer;
      text-decoration: none;
    }
    .nav-links a::after,
    .nav-links button::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 2px;
      background: var(--neon-b);
      transition: width var(--speed);
    }
    .nav-links a:hover::after,
    .nav-links button:hover::after {
      width: 100%;
    }
    #theme-btn:hover {
      background: transparent !important;
      box-shadow: none !important;
      animation: flicker 1.5s infinite;
    }
    @keyframes flicker {
      0%,18%,22%,25%,53%,57%,100% { opacity:1; }
      20%,24%,55% { opacity:.4; }
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
    }
    .hamburger, .hamburger::before, .hamburger::after {
      width: 28px; height: 3px;
      background: var(--neon);
      display: block;
      position: relative;
      transition: all var(--speed);
    }
    .hamburger::before, .hamburger::after {
      content: ''; position: absolute; left: 0;
    }
    .hamburger::before { top: -8px; }
    .hamburger::after { top: 8px; }
    .hamburger.open {
      transform: rotate(45deg);
    }
    .hamburger.open::before {
      top: 0;
      transform: rotate(90deg);
    }
    .hamburger.open::after {
      top: 0;
      opacity: 0;
    }
    @media (max-width: 768px) {
      .nav-toggle { display: block; }
      .nav-links {
        display: none; flex-direction: column;
        position: fixed;
        top: 60px; right: 0;
        width: 200px; height: calc(100% - 60px);
        background: var(--bg-light);
        padding: 2rem;
      }
      .nav-links.show { display: flex; }
      .nav-links li { margin: 1rem 0; }
    }
  
    /* ==== PROGRESS BAR UNDER HEADER ==== */
    #progress-container {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 4px;
      background: var(--bg-light);
    }
    #progress-bar {
      width: 0%; height: 100%;
      background: var(--neon);
    }
  
    /* ========== MUSIC PLAYER (same on both pages) ============================ */
    .music-player {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-left: 2rem;
      margin-right: auto;
      font-family: var(--font-mono);
      color: var(--neon);
      opacity: .7;
      transition: opacity var(--speed) ease;
    }
    .music-player:hover { opacity: .95; }
    .music-player button {
      background: transparent; border: none;
      font-size: 1.1rem; cursor: pointer;
      color: var(--neon);
      transition: color var(--speed), text-shadow var(--speed);
    }
    .music-player button:hover {
      color: var(--neon-b);
      text-shadow: 0 0 4px var(--neon-b);
    }
    .music-player input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100px; height: 4px;
      background: var(--neon-b);
      border-radius: 2px; cursor: pointer;
    }
    .music-player input[type="range"]::-webkit-slider-thumb,
    .music-player input[type="range"]::-moz-range-thumb {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--neon);
    }
    .music-player span {
      font-size: .8rem;
      white-space: nowrap;
    }
    #track-info {
      display: inline-block; max-width: 200px;
      overflow: hidden; white-space: nowrap;
      text-overflow: ellipsis;
    }
    #track-info .marquee {
      display: inline-block;
      padding-left: 100%;
      animation: scroll-text 20s linear infinite;
    }
  
    /* ========== HERO (main page only; safe to include) ======================== */
    .hero {
      height: auto;
      padding: 3rem 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: url('assets/images/hero-bg.jpg') center/cover no-repeat;
      position: relative;
      margin-top: 60px;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.6);
    }
    .hero-title {
      font-size: 2.5rem;
      color: var(--neon);
      font-family: var(--font-mono);
      z-index: 1;
      animation: flicker 2s infinite;
    }
    .hero-sub {
      font-size: 1rem;
      color: #ccc;
      margin-top: 1rem;
      z-index: 1;
    }
    .hero .btn {
      margin-top: 2rem;
      z-index: 1;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 4px var(--neon); }
      50%  { box-shadow: 0 0 14px var(--neon-b); }
      100% { box-shadow: 0 0 4px var(--neon); }
    }
    .hero.hidden {
      animation: fadeOut .8s forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }
  
    /* ========== GRID & POSTS (main page) ====================================== */
    .search-bar {
      margin: 2rem 0 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      position: sticky;
      top: 60px;
      background: var(--bg-dark);
      padding-top: 1rem;
      z-index: 90;
    }
    #search {
      width: 100%;
      padding: .7rem;
      border: 1px solid var(--neon);
      border-radius: var(--radius);
      background: var(--bg-light);
      color: var(--text);
    }
    .tags {
      display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1rem;
    }
    .tags button {
      padding: .3rem .8rem;
      border: 1px solid var(--neon-b);
      background: transparent;
      color: var(--neon-b);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: .8rem;
      transition: background var(--speed);
    }
    .tags button.active,
    .tags button:hover {
      background: var(--neon-b);
      color: var(--bg-dark);
    }
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    .post-card {
      background: var(--bg-light);
      border: 1px solid var(--neon);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform var(--speed), box-shadow var(--speed), opacity .3s;
    }
    .post-card.hidden { opacity: 0; }
    .post-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 8px var(--neon-b);
    }
    .post-thumbnail img {
      width: 100%; display: block;
      object-fit: cover; min-height: 160px;
      transition: transform .6s; will-change: transform;
    }
    .post-card:hover .post-thumbnail img {
      transform: scale(1.05);
    }
    .post-content {
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }
    .post-title {
      font-size: 1.2rem;
      color: var(--neon-b);
      margin-bottom: .4rem;
    }
    .post-excerpt {
      color: #ccc;
      font-size: .95rem;
      line-height: 1.55;
      margin-bottom: .8rem;
      flex: 1;
    }
    .post-meta {
      font-size: .75rem;
      color: #888;
      margin-top: auto;
      position: absolute;
      bottom: 6px; left: 1rem; right: 1rem;
    }
    .skeleton {
      background: linear-gradient(90deg, #333 25%, #444 50%, #333 75%);
      background-size: 200% 100%;
      animation: skeleton 1.25s infinite;
    }
    @keyframes skeleton {
      0%   { background-position: 200%; }
      100% { background-position: -200%; }
    }
    .lazy {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .6s ease-out, transform .6s ease-out;
    }
    .lazy.visible {
      opacity: 1;
      transform: translateY(0);
    }
  
    /* ========== PAGINATION (main page) ======================================== */
    .pagination {
      display: flex; justify-content: center; align-items: center; gap: 1rem;
      margin: 3rem 0;
    }
    .pagination a {
      color: var(--neon);
      text-decoration: none;
      position: relative;
      padding-bottom: 2px;
      transition: opacity .3s;
    }
    .pagination a::after {
      content: '';
      position: absolute;
      left: 0; bottom: 0;
      width: 0; height: 2px;
      background: var(--neon);
      transition: width var(--speed);
    }
    .pagination a:hover::after {
      width: 100%;
    }
  
    /* ========== CONTACT & FORM (main page) ==================================== */
    .contact {
      margin: 4rem 0;
    }
    .contact form {
      background: var(--bg-light);
      padding: 2rem;
      border-radius: var(--radius);
      box-shadow: 0 0 8px rgba(0,0,0,.5);
      max-width: 600px;
      margin: 0 auto;
      transition: box-shadow .3s;
    }
    .contact form:hover {
      box-shadow: 0 6px 16px rgba(0,0,0,.12), 0 3px 6px rgba(0,0,0,.06);
    }
    .contact h2 {
      font-family: var(--font-mono);
      margin-bottom: 1rem;
    }
    .contact label {
      display: block;
      color: #ccc;
      margin: .4rem 0;
    }
    .contact input,
    .contact textarea {
      width: 100%;
      padding: .7rem;
      background: #222;
      border: 1px solid #444;
      color: #eee;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      transition: background .3s, border-color .3s;
    }
    .contact input:focus,
    .contact textarea:focus {
      background: #fff;
      border-color: #bbb;
      outline: none;
    }
    .contact input::placeholder,
    .contact textarea::placeholder {
      color: #333;
      opacity: 1;
    }
    .contact button {
      background: var(--neon-b);
      color: var(--bg-dark);
      border: none;
      padding: .7rem 1.4rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .3s, box-shadow .3s;
    }
    .contact button:hover {
      background: var(--neon);
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    #my-form-status {
      display: block;
      margin-top: .75rem;
      color: var(--neon-b);
    }
  
    /* ========== FOOTER & SOCIAL =============================================== */
    footer {
      background: rgba(0,0,0,.85);
      text-align: center;
      padding: 2rem 0;
      margin-top: 4rem;
    }
    footer p {
      color: #888;
      font-size: .9rem;
    }
    .social { list-style: none; margin-top: 1rem; }
    .social li { display: inline-block; margin: 0 .5rem; }
    .social img {
      width: 28px;
      filter: invert(1);
      transition: transform var(--speed);
    }
    .social a:hover img {
      transform: scale(1.15) rotate(-8deg);
    }
  
    /* ========== BACK TO TOP ================================================== */
    #top {
      position: fixed;
      right: 1rem; bottom: 1rem;
      width: 48px; height: 48px;
      background: var(--neon-b);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0; visibility: hidden;
      transition: opacity var(--speed), visibility var(--speed);
      z-index: 1000;
    }
    #top.visible {
      opacity: 1;
      visibility: visible;
    }
    #top svg {
      width: 24px; height: 24px; fill: var(--bg-dark);
    }
  </style>
  
</head>

<body>

  <!-- ========= HEADER ========= -->
  <header>
    <nav class="navbar flex just-between">
      <div class="logo">
        <a href="/feed/blog">CyberBlogX~RK</a>
      </div>

      <!-- ========== MUSIC PLAYER ========== -->
      <div class="music-player">
        <button id="prev-btn" aria-label="Previous Track">⏮</button>
        <button id="play-btn" aria-label="Play/Pause">▶️</button>
        <button id="next-btn" aria-label="Next Track">⏭</button>

        <span id="current-time">0:00</span>
        <input type="range" id="seek-bar" min="0" max="100" value="0">
        <span id="duration">0:00</span>

        <button id="mute-btn" aria-label="Mute">🔊</button>
        <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="0.7">

        <span id="track-info">
          <span class="marquee">Loading playlist…</span>
        </span>
        <audio id="audio-player" preload="auto"></audio>
      </div>

      <!-- ========== NAV LINKS ========== -->
      <ul class="nav-links">
        <li><a href="/layer/redacted.html" aria-label="Home">🏠</a></li>
        <li><a id="theme-btn" href="#" aria-label="Toggle Theme">💡</a></li>
        <li><a href="#contact" aria-label="Contact">📧</a></li>
      </ul>

      <!-- mobile menu toggle -->
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span class="hamburger"></span>
      </button>
    </nav>
    <div id="progress-container"><div id="progress-bar"></div></div>
  </header>

  <!-- ========= POST CONTENT ========= -->
  <article class="post-content container">
    <h1 id="title">Loading…</h1>
    <div id="body">Please wait.</div>

    <!-- optional video -->
    <section id="video-section" style="display:none; margin-top:2rem;">
      <h2>Featured Video</h2>
      <iframe
        id="video-frame" width="560" height="315"
        src="" frameborder="0"
        allow="encrypted-media; fullscreen" allowfullscreen>
      </iframe>
    </section>

    <!-- optional background audio -->
    <section id="audio-section" style="display:none; margin-top:2rem;">
      <h2>Background Audio</h2>
      <audio
        id="bg-audio" controls autoplay loop muted
        style="width:100%; margin-top:.5rem;">
        <source src="" type="audio/flac">
        Your browser does not support HTML5 Audio.
      </audio>
    </section>
  </article>

  <!-- ========= BACK TO TOP ========= -->
  <div id="top" title="Back to top">
    <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg>
  </div>

  <!-- ========= SCRIPTS ========= -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    /* THEME TOGGLE */
    const root = document.documentElement;
    let theme = localStorage.getItem('theme') || 'dark';
    function applyTheme(){
      root.classList.toggle('light', theme==='light');
      localStorage.setItem('theme', theme);
    }
    applyTheme();
    document.getElementById('theme-btn').addEventListener('click', e=>{
      e.preventDefault();
      theme = theme==='dark'?'light':'dark';
      applyTheme();
    });

    /* MOBILE NAV */
    document.querySelector('.nav-toggle').addEventListener('click', ()=>{
      document.querySelector('.nav-links').classList.toggle('show');
      document.querySelector('.hamburger').classList.toggle('open');
    });

    /* BACK TO TOP */
    const topBtn = document.getElementById('top');
    window.addEventListener('scroll', ()=>{
      topBtn.classList.toggle('visible', window.scrollY>300);
    });
    topBtn.addEventListener('click', ()=>window.scrollTo({top:0,behavior:'smooth'}));

    /* AUDIO + MUSIC PLAYER */
    const audio      = document.getElementById('audio-player');
    const playBtn    = document.getElementById('play-btn');
    const prevBtn    = document.getElementById('prev-btn');
    const nextBtn    = document.getElementById('next-btn');
    const trackInfo  = document.getElementById('track-info');
    const currentTimeElem = document.getElementById('current-time');
    const durationElem    = document.getElementById('duration');
    const seekBar         = document.getElementById('seek-bar');
    const muteBtn         = document.getElementById('mute-btn');
    const volumeBar       = document.getElementById('volume-bar');
    const progressBar     = document.getElementById('progress-bar');

    let playlist = [], idx=0, playing=false;

    // Load playlist.json
    fetch('/assets/playlist/playlist.json')
      .then(r=>r.json())
      .then(data=>{
        playlist = data;
        if(playlist.length) loadTrack(0);
        else trackInfo.textContent='No tracks';
      })
      .catch(()=> trackInfo.textContent='Playlist error');

    function loadTrack(i){
      const t = playlist[i];
      audio.src = t.url;
      trackInfo.innerHTML = `<span class="marquee">${t.title} — ${t.artist}</span>`;
      idx = i;
    }
    function togglePlay(){
      if(!playlist.length) return;
      playing? audio.pause() : audio.play();
    }
    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', ()=>{ idx=(idx-1+playlist.length)%playlist.length; loadTrack(idx); audio.play(); });
    nextBtn.addEventListener('click', ()=>{ idx=(idx+1)%playlist.length; loadTrack(idx); audio.play(); });
    audio.addEventListener('play', ()=>{ playing=true; playBtn.textContent='❚❚'; });
    audio.addEventListener('pause', ()=>{ playing=false; playBtn.textContent='▶️'; });
    audio.addEventListener('ended', ()=> nextBtn.click());

    audio.addEventListener('loadedmetadata', ()=>{
      durationElem.textContent = formatTime(audio.duration);
      seekBar.max = Math.floor(audio.duration);
    });
    audio.addEventListener('timeupdate', ()=>{
      const t = Math.floor(audio.currentTime);
      currentTimeElem.textContent = formatTime(t);
      seekBar.value = t;
      progressBar.style.width = (audio.currentTime/audio.duration*100)+'%';
    });
    seekBar.addEventListener('input', ()=> audio.currentTime = seekBar.value );
    muteBtn.addEventListener('click', ()=>{
      audio.muted = !audio.muted;
      muteBtn.textContent = audio.muted? '🔇':'🔊';
    });
    volumeBar.addEventListener('input', ()=>{
      audio.volume = volumeBar.value;
      if(audio.muted && audio.volume>0) audio.muted=false;
      muteBtn.textContent = audio.muted? '🔇':'🔊';
    });
    function formatTime(sec){
      const m = Math.floor(sec/60), s = String(Math.floor(sec%60)).padStart(2,'0');
      return `${m}:${s}`;
    }

    /* LOAD POST CONTENT */
    marked.setOptions({ gfm:true, headerIds:true, mangle:false });
    const slug = window.location.pathname.match(/\/([^\/]+)\.html$/)?.[1];
    if(!slug){
      document.getElementById('body').textContent='Invalid URL';
    } else {
      fetch(`./${slug}.json`)
        .then(r=>r.json())
        .then(j=>{
          document.getElementById('title').textContent = j.title;
          if(j.markdown){
            return fetch(`./${slug}.md`)
              .then(r=>r.text())
              .then(md=> document.getElementById('body').innerHTML = marked.parse(md));
          } else {
            document.getElementById('body').innerHTML = j.content||'';
          }
        })
        .catch(()=> document.getElementById('body').textContent='Post not found.');
    }
  </script>
</body>
</html>
