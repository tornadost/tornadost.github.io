<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CyberBlogX – Post {{ID}}</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap"
    rel="stylesheet"
  >
  <style>
    /* ========== ROOT & RESET ================================================= */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;background:var(--bg-dark);color:var(--text);
      scroll-behavior:smooth;overflow-x:hidden;font-family:'Roboto',sans-serif}
    :root{--neon:#0f0;--neon-b:#39ff14;--bg-dark:#000;--bg-light:#111;--text:#eee;
      --radius:8px;--speed:.3s;--font-mono:'Press Start 2P',cursive}
    :root.light{--bg-dark:#fafafa;--bg-light:#fff;--text:#222;--neon:#05f;--neon-b:#0ff}

    /* ========== UTILITIES ==================================================== */
    .container{max-width:var(--max,1200px);margin:0 auto;padding:1rem}
    .flex{display:flex;align-items:center}.just-between{justify-content:space-between}
    .btn{display:inline-block;font-family:var(--font-mono);text-transform:uppercase;
      padding:.7rem 1.4rem;border:1px solid var(--neon);color:var(--neon);
      background:transparent;border-radius:var(--radius);letter-spacing:.05em;
      transition:background var(--speed),color var(--speed),box-shadow var(--speed)}
    .btn:hover{background:var(--neon);color:var(--bg-dark);
      box-shadow:0 0 8px var(--neon),0 0 16px var(--neon-b)}

    /* ========== HEADER ======================================================= */
    header{position:fixed;top:0;left:0;width:100%;background:rgba(0,0,0,.8);
      backdrop-filter:blur(6px);z-index:100}
    .navbar{max-width:var(--max,1200px);margin:0 auto;padding:1rem}
    .logo a{font-family:var(--font-mono);font-size:1.5rem;color:var(--neon);
      text-decoration:none;text-shadow:0 0 4px var(--neon)}
    .nav-links{list-style:none}.nav-links li{display:inline-block;margin-left:2rem}
    .nav-links a{color:var(--neon);text-decoration:none;position:relative}
    .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;
      height:2px;background:var(--neon-b);transition:width var(--speed)}
    .nav-links a:hover::after{width:100%}
    .nav-toggle{display:none;background:none;border:none;cursor:pointer}
    .hamburger,.hamburger::before,.hamburger::after{width:28px;height:3px;
      background:var(--neon);display:block;position:relative;transition:all var(--speed)}
    .hamburger::before,.hamburger::after{content:'';position:absolute;left:0}
    .hamburger::before{top:-8px}.hamburger::after{top:8px}
    .hamburger.open{transform:rotate(45deg)}.hamburger.open::before{top:0;transform:rotate(90deg)}
    .hamburger.open::after{top:0;opacity:0}
    @media(max-width:768px){
      .nav-toggle{display:block}
      .nav-links{display:none;flex-direction:column;position:fixed;top:60px;right:0;
        width:200px;height:calc(100% - 60px);background:var(--bg-light);padding:2rem}
      .nav-links.show{display:flex}.nav-links li{margin:1rem 0}
    }

    /* ========== POST LAYOUT ================================================== */
    .post-content{max-width:800px;margin:100px auto 2rem auto;line-height:1.6;padding:0 1rem}
    .post-content h2,
    .post-content h3,
    .post-content h4{margin-top:2rem}
    h1{font-family:var(--font-mono);color:var(--neon-b);margin-bottom:1rem}

    /* ========== BACK TO TOP ================================================== */
    #top{position:fixed;right:1rem;bottom:1rem;width:48px;height:48px;
      background:var(--neon-b);border-radius:50%;display:flex;align-items:center;
      justify-content:center;cursor:pointer;opacity:0;visibility:hidden;
      transition:opacity var(--speed),visibility var(--speed);z-index:1000}
    #top.visible{opacity:1;visibility:visible}
    #top svg{width:24px;height:24px;fill:var(--bg-dark)}
  </style>

  <!-- Marked.js for Markdown rendering + header-ID support -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    marked.setOptions({
      gfm: true,
      headerIds: true,
      headerPrefix: '',
      mangle: false
    });
  </script>
</head>
<body>
  <!-- HEADER -->
  <header>
    <nav class="navbar flex just-between">
      <div class="logo"><a href="/">CyberBlogX</a></div>
      <ul class="nav-links">
        <li><a href="/#posts">Posts</a></li>
        <li><a href="/#contact">Contact</a></li>
        <li><a id="theme-btn" href="#">Toggle Theme</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span class="hamburger"></span>
      </button>
    </nav>
  </header>

  <!-- POST CONTENT -->
  <article class="post-content container">
    <h1 id="title">Loading…</h1>
    <div id="body">Please wait.</div>

    <!-- Video Section (no autoplay) -->
    <section id="video-section" style="display:none; margin-top:2rem;">
      <h2>Featured Video</h2>
      <iframe id="video-frame" width="560" height="315"
        src="" title="YouTube video player" frameborder="0"
        allow="encrypted-media; fullscreen" allowfullscreen>
      </iframe>
    </section>

    <!-- Audio Section (autoplay) -->
    <section id="audio-section" style="display:none; margin-top:2rem;">
      <h2>Background Audio</h2>
      <audio id="audio-player" controls autoplay loop style="width:100%;margin-top:0.5rem;">
        <source src="" type="audio/flac">
        Your browser does not support the HTML5 Audio element.
      </audio>
    </section>
  </article>

  <!-- BACK TO TOP -->
  <div id="top" title="Back to top">
    <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg>
  </div>

  <script>
    // THEME TOGGLE
    const root = document.documentElement;
    let theme = localStorage.getItem('theme') || 'dark';
    const applyTheme = () => {
      root.classList.toggle('light', theme === 'light');
      localStorage.setItem('theme', theme);
    };
    applyTheme();
    document.getElementById('theme-btn').addEventListener('click', e => {
      e.preventDefault();
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme();
    });

    // MOBILE NAV
    document.querySelector('.nav-toggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('show');
      document.querySelector('.hamburger').classList.toggle('open');
    });

    // BACK TO TOP
    const topBtn = document.getElementById('top');
    window.addEventListener('scroll', () => {
      window.scrollY > 300
        ? topBtn.classList.add('visible')
        : topBtn.classList.remove('visible');
    });
    topBtn.addEventListener('click', () =>
      window.scrollTo({ top: 0, behavior: 'smooth' })
    );

    // LOAD POST + Markdown + Media
    const m = window.location.pathname.match(/\/posts\/feed\/(\d+)\/\1\.html$/);
    if (!m) {
      document.getElementById('body').textContent = 'Invalid post URL';
    } else {
      const id = m[1];
      fetch(`./${id}.json`)
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(j => {
          // Title
          document.getElementById('title').textContent = j.title;

          // Content
          if (j.markdown) {
            fetch(`./${id}.md`)
              .then(r => r.ok ? r.text() : Promise.reject())
              .then(md => {
                document.getElementById('body').innerHTML = marked.parse(md);
              })
              .catch(() => {
                document.getElementById('body').textContent = 'Content not found.';
              });
          } else {
            document.getElementById('body').innerHTML = j.content || '';
          }

          // Video (no autoplay)
          if (j.video_url) {
            const vs = document.getElementById('video-section');
            const vf = document.getElementById('video-frame');
            vf.src = j.video_url;
            vs.style.display = 'block';
          }

          // Audio (autoplay)
          if (j.audio_url) {
            const as = document.getElementById('audio-section');
            const ap = document.getElementById('audio-player');
            ap.src = j.audio_url;
            as.style.display = 'block';
          }
        })
        .catch(() => {
          document.getElementById('body').textContent = 'Post not found.';
        });
    }
  </script>
</body>
</html>
