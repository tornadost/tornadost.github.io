<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberBlogX – Post {{ID}}</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* ========== ROOT & RESET ================================================= */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;background:var(--bg-dark);color:var(--text);scroll-behavior:smooth;overflow-x:hidden;font-family:'Roboto',sans-serif}
    :root{--neon:#0f0;--neon-b:#39ff14;--bg-dark:#000;--bg-light:#111;--text:#eee;--radius:8px;--speed:.3s;--font-mono:'Press Start 2P',cursive}
    :root.light{--bg-dark:#fafafa;--bg-light:#fff;--text:#222;--neon:#05f;--neon-b:#0ff}

    /* ========== UTILITIES ==================================================== */
    .container{max-width:var(--max);margin:0 auto;padding:1rem}
    .flex{display:flex;align-items:center}.just-between{justify-content:space-between}
    .btn{display:inline-block;font-family:var(--font-mono);text-transform:uppercase;padding:.7rem 1.4rem;border:1px solid var(--neon);color:var(--neon);background:transparent;border-radius:var(--radius);letter-spacing:.05em;transition:background var(--speed),color var(--speed),box-shadow var(--speed)}
    .btn:hover{background:var(--neon);color:var(--bg-dark);box-shadow:0 0 8px var(--neon),0 0 16px var(--neon-b)}

    /* ========== HEADER ======================================================= */
    header{position:fixed;top:0;left:0;width:100%;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:100}
    .navbar{max-width:var(--max);margin:0 auto;padding:1rem}
    .logo a{font-family:var(--font-mono);font-size:1.5rem;color:var(--neon);text-decoration:none;text-shadow:0 0 4px var(--neon)}
    .nav-links{list-style:none}.nav-links li{display:inline-block;margin-left:2rem}
    .nav-links a{color:var(--neon);text-decoration:none;position:relative}
    .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--neon-b);transition:width var(--speed)}
    .nav-links a:hover::after{width:100%}
    .nav-toggle{display:none;background:none;border:none;cursor:pointer}
    .hamburger,.hamburger::before,.hamburger::after{width:28px;height:3px;background:var(--neon);display:block;position:relative;transition:all var(--speed)}
    .hamburger::before,.hamburger::after{content:'';position:absolute;left:0}
    .hamburger::before{top:-8px}.hamburger::after{top:8px}
    .hamburger.open{transform:rotate(45deg)}.hamburger.open::before{top:0;transform:rotate(90deg)}.hamburger.open::after{top:0;opacity:0}
    @media(max-width:768px){.nav-toggle{display:block}.nav-links{display:none;flex-direction:column;position:fixed;top:60px;right:0;width:200px;height:calc(100% - 60px);background:var(--bg-light);padding:2rem}.nav-links.show{display:flex}.nav-links li{margin:1rem 0}}

    /* ========== POST LAYOUT ================================================== */
    .post-cover{max-width:800px;margin:80px auto 0 auto}
    .post-cover img{width:100%;border-radius:var(--radius)}
    .post-content{max-width:800px;margin:2rem auto;line-height:1.6;padding:0 1rem}
    h1{font-family:var(--font-mono);color:var(--neon-b);margin-bottom:1rem}

    /* ========== BACK TO TOP ================================================== */
    #top{position:fixed;right:1rem;bottom:1rem;width:48px;height:48px;background:var(--neon-b);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;visibility:hidden;transition:opacity var(--speed),visibility var(--speed);z-index:1000}
    #top.visible{opacity:1;visibility:visible}
    #top svg{width:24px;height:24px;fill:var(--bg-dark)}
  </style>
</head>
<body>
  <!-- HEADER -->
  <header>
    <nav class="navbar flex just-between">
      <div class="logo"><a href="/">CyberBlogX</a></div>
      <ul class="nav-links">
        <li><a href="/#posts">Posts</a></li>
        <li><a href="/#contact">Contact</a></li>
        <li><a id="theme-btn" href="#">Toggle Theme</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle navigation"><span class="hamburger"></span></button>
    </nav>
  </header>

  <!-- COVER & CONTENT -->
  <div class="post-cover">
    <img id="cover" src="" alt="Cover">
  </div>
  <article class="post-content">
    <h1 id="title">Loading…</h1>
    <div id="body">Please wait.</div>
  </article>

  <!-- BACK TO TOP -->
  <div id="top" title="Back to top">
    <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg>
  </div>

  <script>
    /* THEME TOGGLE */
    const root=document.documentElement, themeBtn=document.getElementById('theme-btn');
    let theme=localStorage.getItem('theme')||'dark';
    const applyTheme=_=>{root.classList.toggle('light',theme==='light');localStorage.setItem('theme',theme)};
    applyTheme();
    themeBtn.addEventListener('click',e=>{e.preventDefault();theme=theme==='dark'?'light':'dark';applyTheme();});

    /* MOBILE NAV */
    document.querySelector('.nav-toggle').addEventListener('click',()=>{
      document.querySelector('.nav-links').classList.toggle('show');
      document.querySelector('.hamburger').classList.toggle('open');
    });

    /* BACK TO TOP BTN */
    const topBtn = document.getElementById('top');
    window.addEventListener('scroll',()=>window.scrollY>300?topBtn.classList.add('visible'):topBtn.classList.remove('visible'));
    topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

    /* LOAD POST */
    const m = window.location.pathname.match(/\/posts\/feed\/(\d+)\/(\d+)\.html$/);
    if(!m || m[1]!==m[2]){
      document.getElementById('body').textContent='Invalid URL';
    } else {
      const id=m[1];
      fetch(`./${id}.json`)
        .then(r=>r.ok? r.json(): Promise.reject())
        .then(j=>{
          document.getElementById('title').textContent=j.title;
          document.getElementById('cover').src=`/posts/assets/cover/${id}.png`;
          document.getElementById('body').innerHTML=j.content;
        })
        .catch(_=>{document.getElementById('body').textContent='Post not found.';});
    }
  </script>
</body>
</html>
