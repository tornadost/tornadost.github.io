<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberBlogX</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/blog-index.css">
</head>
<body>

 <!-- ========= HEADER ========= -->
<header>
  <nav class="navbar flex just-between">
    <div class="logo">
      <a href="/feed/blog">CyberBlogX~RK</a>
    </div>

    <div class="music-player">
      <button id="prev-btn" aria-label="Previous">⏮</button>
      <button id="play-btn" aria-label="Play/Pause">▶️</button>
      <button id="next-btn" aria-label="Next">⏭</button>

      <!-- current time -->
      <span id="current-time">0:00</span>

      <!-- seek slider -->
      <input type="range" id="seek-bar" min="0" max="100" value="0">

      <!-- duration -->
      <span id="duration">0:00</span>

      <!-- volume -->
      <button id="mute-btn" aria-label="Mute">🔊</button>
      <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="0.7">

      <!-- track info -->
      <span id="track-info">
        <span class="marquee">Loading playlist…</span>
      </span>

      <audio id="audio-player" preload="auto"></audio>

      <!-- PROGRESS BAR (inside the player!) -->
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <ul class="nav-links">
      <li><a href="/layer/redacted.html" aria-label="Home">🏠</a></li>
      <li><button id="theme-btn" aria-label="Toggle Theme">💡</button></li>
      <li><a href="#contact" aria-label="Contact">📧</a></li>
    </ul>

    <button class="nav-toggle" aria-label="Toggle navigation">
      <span class="hamburger"></span>
    </button>
  </nav>
</header>


  <!-- ========= HERO ========= -->
  <section class="hero" id="hero">
    <h1 class="hero-title">Welcome!</h1>
    <p class="hero-sub">Diving deep into the Matrix, one post at a time..</p>
    <a href="#posts" class="btn">Explore</a>
  </section>

  <!-- ========= MAIN ========= -->
  <main class="container" id="posts">
    <div class="search-bar">
      <input id="search" type="search" placeholder="Search..">
      <button id="clear" class="btn hidden">Clear</button>
    </div>
    <div id="tag-wrap" class="tags"></div>
    <section id="grid" class="posts-grid"></section>
    <nav id="pager" class="pagination"></nav>
  </main>

  <!-- ========= CONTACT ========= -->
  <section class="contact" id="contact">
    <form id="my-form" action="https://formspree.io/f/xyzwjypw" method="POST">
      <h2>Get in Touch</h2>
  
      <label>
        Name
        <input name="name" type="text" required>
      </label>
  
      <label>
        Email
        <input name="email" type="email" required>
      </label>
  
      <label>
        Message
        <textarea name="message" rows="5" required></textarea>
      </label>
  
      <button type="submit">Send</button>
      <p id="my-form-status"></p>
    </form>
  </section>
  
  <script>
    (function() {
      const form   = document.getElementById("my-form");
      const status = document.getElementById("my-form-status");
  
      async function handleSubmit(event) {
        event.preventDefault();
        status.textContent = "Sending…";
  
        const data = new FormData(form);
        try {
          const res = await fetch(form.action, {
            method: form.method,
            body: data,
            headers: { "Accept": "application/json" }
          });
  
          if (res.ok) {
            status.textContent = "Thanks for your submission!";
            form.reset();
          } else {
            const json = await res.json();
            if (json.errors) {
              status.textContent = json.errors
                .map(err => err.message)
                .join(", ");
            } else {
              status.textContent = "Oops! There was a problem submitting your form.";
            }
          }
        } catch (err) {
          status.textContent = "Network error. Please try again later.";
        }
      }
  
      form.addEventListener("submit", handleSubmit);
    })();
  </script>
  
  <!-- ========= FOOTER ========= -->
  <footer>
    <div class="container">
      <p>&copy; <span id="yr"></span> CyberBlogX. All Rights Reserved.</p>
      <ul class="social">
        <li><a href="#"><img src="assets/icons/twitter.svg" alt="Twitter"></a></li>
        <li><a href="#"><img src="assets/icons/github.svg" alt="GitHub"></a></li>
        <li><a href="#"><img src="assets/icons/linkedin.svg" alt="LinkedIn"></a></li>
      </ul>
    </div>
  </footer>

  <!-- ========= BACK TO TOP ========= -->
  <div id="top" title="Back to top"><svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg></div>

  <script>
    /* ------- THEME & NAV & HERO ------- */
    const root = document.documentElement,
          themeBtn = document.getElementById('theme-btn');
    let theme = localStorage.getItem('theme') || 'dark';
    const applyTheme = () => {
      root.classList.toggle('light', theme === 'light');
      localStorage.setItem('theme', theme);
    };
    applyTheme();
    themeBtn.addEventListener('click', e => {
      e.preventDefault();
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme();
    });

    document.querySelector('.nav-toggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('show');
      document.querySelector('.hamburger').classList.toggle('open');
    });

    /* ------- BACK TO TOP ------- */
    const topBtn = document.getElementById('top');
    window.addEventListener('scroll', () => {
      window.scrollY > 300
        ? topBtn.classList.add('visible')
        : topBtn.classList.remove('visible');
    });
    topBtn.addEventListener('click', () =>
      window.scrollTo({ top: 0, behavior: 'smooth' })
    );

    /* ------- CONTACT FAKE SUBMIT ------- */
    document.querySelector('.contact form').addEventListener('submit', e => {
      e.preventDefault();
      const st = document.getElementById('status');
      st.textContent = 'Sending…';
      setTimeout(() => (st.textContent = 'Message sent!'), 1200);
    });

    /* ------- DYNAMIC POST RENDER (GITHUB API DISCOVERY) ------- */
    const PER_PAGE = 6;
    let postsList = [], page = 1, currentTag = '', q = '';
    const grid = document.getElementById('grid'),
          pager = document.getElementById('pager'),
          tagWrap = document.getElementById('tag-wrap'),
          searchIn = document.getElementById('search'),
          clearBtn2 = document.getElementById('clear');

    const ioCard = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          ioCard.unobserve(e.target);
        }
      });
    }, { threshold: 0.3 });

    const ioImg = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const img = e.target;
          img.src = img.dataset.src;
          img.onload = () => img.classList.remove('skeleton');
          ioImg.unobserve(img);
        }
      });
    }, { rootMargin: '200px' });

    async function loadPosts() {
      const owner = 'tornadost',
            repo  = 'tornadost.github.io',
            path  = 'posts/feed';
      // 1) List folders under /posts/feed
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      const listRes = await fetch(apiUrl);
      if (!listRes.ok) throw new Error(`Could not list posts: ${listRes.status}`);
      const entries = await listRes.json();

      // 2) Filter numeric dirs
      const dirs = entries
        .filter(e => e.type === 'dir' && /^\d+$/.test(e.name))
        .map(e => e.name)
        .sort((a, b) => Number(a) - Number(b));

      // 3) Fetch each N.json
      const posts = [];
      for (const id of dirs) {
        try {
          const jsonUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${path}/${id}/${id}.json`;
          const postRes = await fetch(jsonUrl);
          if (!postRes.ok) continue;
          const j = await postRes.json();
          posts.push({
            id:      Number(id),
            title:   j.title,
            excerpt: j.excerpt,
            date:    j.date,
            read:    j.read,
            tags:    j.tags,
            img:     `/posts/assets/cover/${id}.png`
          });
        } catch (e) {
          console.warn(`Skipping post ${id}:`, e);
        }
      }
      return posts;
    }

    function cardHTML(p) {
      return `
      <article class="post-card lazy">
        <a href="/posts/feed/${p.id}/${p.id}.html">
          <div class="post-thumbnail">
            <img data-src="${p.img}" alt="${p.title}" class="skeleton" loading="lazy">
          </div>
          <div class="post-content">
            <h2 class="post-title">${p.title}</h2>
            <p class="post-excerpt">${p.excerpt}</p>
            <span class="post-meta">${p.date} • ${p.read} min read</span>
          </div>
        </a>
      </article>`;
    }

    function renderTags() {
      tagWrap.innerHTML = '';
      const all = [...new Set(postsList.flatMap(p => p.tags))].sort();
      all.forEach(t => {
        const btn = document.createElement('button');
        btn.textContent = t;
        btn.onclick = () => {
          currentTag = (currentTag === t ? '' : t);
          page = 1; draw();
          tagWrap.querySelectorAll('button').forEach(b =>
            b.classList.toggle('active', b.textContent === currentTag)
          );
          clearBtn2.classList.toggle('hidden', !currentTag);
        };
        tagWrap.appendChild(btn);
      });
    }

    function filterList() {
      let lst = postsList;
      if (currentTag) lst = lst.filter(p => p.tags.includes(currentTag));
      if (q) lst = lst.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.excerpt.toLowerCase().includes(q)
      );
      return lst;
    }

    function draw() {
      const list = filterList();
      const slice = list.slice((page - 1) * PER_PAGE, page * PER_PAGE);

      document.querySelectorAll('.post-card').forEach(c => c.classList.add('hidden'));
      setTimeout(() => {
        grid.innerHTML = slice.map(cardHTML).join('');
        grid.querySelectorAll('.lazy').forEach(card => {
          ioCard.observe(card);
          ioImg.observe(card.querySelector('img'));
        });
      }, 200);

      pager.innerHTML =
        (page > 1 ? `<a href="#" class="prev">« Newer</a>` : '') +
        `<span> Page ${page} </span>` +
        ((page * PER_PAGE < list.length) ? `<a href="#" class="next">Older »</a>` : '');
      pager.querySelectorAll('a').forEach(a => {
        a.style.opacity = '0';
        setTimeout(() => (a.style.opacity = '1'), 200);
      });
      pager.onclick = e => {
        if (e.target.matches('.prev')) { e.preventDefault(); page--; draw(); }
        if (e.target.matches('.next')) { e.preventDefault(); page++; draw(); }
      };
    }

    // Initialize
    loadPosts()
      .then(a => {
        postsList = a;
        renderTags();
        draw();
      })
      .catch(err => {
        grid.innerHTML = '<p style="color:red">Unable to load posts.</p>';
        console.error(err);
      });

    // Search & clear
    searchIn.addEventListener('input', () => {
      q = searchIn.value.trim().toLowerCase();
      page = 1; draw();
    });
    clearBtn2.addEventListener('click', () => {
      currentTag = '';
      page = 1; draw();
      clearBtn2.classList.add('hidden');
      tagWrap.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    });

    // Footer year
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
<script>
    (function() {
      const audio      = document.getElementById("audio-player");
      const playBtn    = document.getElementById("play-btn");
      const prevBtn    = document.getElementById("prev-btn");
      const nextBtn    = document.getElementById("next-btn");
      const trackInfo  = document.getElementById("track-info");
    
      let playlist      = [];
      let currentIndex  = 0;
      let isPlaying     = false;
    
      // — Fetch your playlist.json (adjust path if needed) —
      fetch("/assets/playlist/playlist.json")
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(data => {
          playlist = data;
          if (playlist.length) {
            loadTrack(0);
          } else {
            trackInfo.textContent = "No tracks available";
          }
        })
        .catch(err => {
          console.error("Playlist load error:", err);
          trackInfo.textContent = "Could not load playlist";
        });
    
      // — Load a track by its index —
      function loadTrack(idx) {
        const t = playlist[idx];
        audio.src            = t.url;
        trackInfo.innerHTML = `<span class="marquee">${t.title} — ${t.artist}</span>`;
        currentIndex         = idx;
      }
    
      // — Toggle play / pause —
      function togglePlayPause() {
        if (!playlist.length) return;
        if (isPlaying) audio.pause();
        else            audio.play();
      }
      playBtn.addEventListener("click", togglePlayPause);
    
      // — Previous track —
      prevBtn.addEventListener("click", () => {
        if (!playlist.length) return;
        currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
        loadTrack(currentIndex);
        audio.play();
      });
    
      // — Next track —
      nextBtn.addEventListener("click", () => {
        if (!playlist.length) return;
        currentIndex = (currentIndex + 1) % playlist.length;
        loadTrack(currentIndex);
        audio.play();
      });
    
      // — Update button icon on play / pause —
      audio.addEventListener("play", () => {
        isPlaying         = true;
        playBtn.textContent = "❚❚";
      });
      audio.addEventListener("pause", () => {
        isPlaying         = false;
        playBtn.textContent = "▶️";
      });
    
      // — Auto-advance at end of track —
      audio.addEventListener("ended", () => nextBtn.click());

    // —— NEW: Seek bar, timer & volume support ——

    const currentTimeElem = document.getElementById("current-time");
    const durationElem    = document.getElementById("duration");
    const seekBar         = document.getElementById("seek-bar");
    const muteBtn         = document.getElementById("mute-btn");
    const volumeBar       = document.getElementById("volume-bar");

    // 1) When metadata loads, set duration & seekBar.max
    audio.addEventListener("loadedmetadata", () => {
    const d = Math.floor(audio.duration);
    durationElem.textContent = formatTime(d);
    seekBar.max = d;
    });

    // 2) As the track plays, update current time & seek position
    audio.addEventListener("timeupdate", () => {
    const t = Math.floor(audio.currentTime);
    currentTimeElem.textContent = formatTime(t);
    seekBar.value = t;
    });

    // 3) Let the user drag the seek bar
    seekBar.addEventListener("input", () => {
    audio.currentTime = seekBar.value;
    });

    // 4) Mute/unmute button
    muteBtn.addEventListener("click", () => {
    audio.muted = !audio.muted;
    muteBtn.textContent = audio.muted ? "🔇" : "🔊";
    });

    // 5) Volume slider
    volumeBar.addEventListener("input", () => {
    audio.volume = volumeBar.value;
    if (audio.muted && audio.volume > 0) audio.muted = false;
    muteBtn.textContent = audio.muted ? "🔇" : "🔊";
    });

    // Helper function to convert seconds → M:SS
    function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = String(Math.floor(sec % 60)).padStart(2, "0");
    return `${m}:${s}`;
    }



      
    })();
    </script>    
</body>
</html>
