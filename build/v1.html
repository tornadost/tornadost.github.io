<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matrix Access Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* ================= RESET & BASE ================= */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #7CFC00;
      font-family: 'Share Tech Mono', monospace;
    }

    /* ============ HIDE UNTIL CLICK ============ */
    #particles-js,
    #matrix {
      display: none;
      pointer-events: none;
    }

    /* ============ INTRO TEXT ============ */
    #intro {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #39ff14;
      font-size: 2.5rem;
      text-align: center;
      text-shadow:
        0 0 10px #39ff14,
        0 0 20px #0f0,
        0 0 30px #0f0;
      cursor: pointer;
      z-index: 10;
      animation:
        flicker 1.5s infinite,
        pulseIntro 2s ease-in-out infinite;
      will-change: opacity, transform;
    }
    @keyframes pulseIntro {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        transform: translate(-50%, -50%) scale(1.05);
      }
    }
    @keyframes flicker {
      0%,20%,40%,60%,80%,100% { opacity: 1; }
      10%,30%,50%,70%,90% { opacity: 0.4; }
    }

    /* ============ PARTICLES & CANVAS ============ */
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.7;
    }
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      mix-blend-mode: screen;
    }

    /* ============ OVERLAY ============ */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }
    .hidden {
      display: none !important;
    }

    /* ============ HEADLINE & ACCESS ============ */
    #headline {
      font-size: 2.5rem;
      white-space: nowrap;
      margin-top: 20vh;
      opacity: 0;
      will-change: transform, opacity;
    }
    @keyframes marquee {
      0%   { transform: translate3d(100vw,0,0); opacity:1; }
      90%  { opacity:1; }
      100% { transform: translate3d(-100%,0,0); opacity:0; }
    }
    #accessSection {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      opacity: 0;
      animation: sectionEntry 1.5s ease-out forwards;
      margin-top: 10vh;
    }
    @keyframes sectionEntry {
      0% { opacity:0; transform: translateY(20px); }
      100% { opacity:1; transform: translateY(0); }
    }

    /* ============ GLITCH EFFECT ============ */
    .glitch {
      position: relative;
      color: #7CFC00;
      font-size: 3rem;
      animation: glitchAnim 1.8s infinite;
      will-change: transform;
      backface-visibility: hidden;
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
      top: 0;
      overflow: hidden;
    }
    @keyframes glitchAnim {
      0%   { transform: translate3d(0,0,0); }
      20%  { transform: translate3d(-2px,2px,0); }
      40%  { transform: translate3d(-2px,-2px,0); }
      60%  { transform: translate3d(2px,2px,0); }
      80%  { transform: translate3d(2px,-2px,0); }
      100% { transform: translate3d(0,0,0); }
    }

    /* ============ CODE BOX ============ */
    #code-box {
      background: rgba(0,0,0,0.9);
      padding: 1rem 2rem;
      border: 2px solid #7CFC00;
      border-radius: 4px;
      font-size: 1.3rem;
      position: relative;
      overflow: hidden;
      display: none;
      will-change: opacity;
    }
    #code-box::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,transparent,rgba(124,252,0,0.2),transparent);
      animation: codeGlow 2s infinite;
      will-change: transform;
    }
    @keyframes codeGlow { 100% { left:100%; } }

    /* ============ HINT IMAGE ============ */
    .hint-img {
      width: 80px;
      margin-top: 1rem;
      opacity: 0;
      animation: fadeIn 1s forwards 0.5s, pulseImg 3s ease-in-out infinite 1s;
    }
    @keyframes pulseImg { 0%,100%{transform:scale(1);}50%{transform:scale(1.1);} }
    @keyframes fadeIn { from{opacity:0;}to{opacity:0.6;} }
  </style>
</head>
<body>

  <!-- Intro -->
  <div id="intro">you take the red pill… you stay in wonderland.</div>

  <!-- Particles.js container -->
  <div id="particles-js"></div>

  <!-- Matrix canvas -->
  <canvas id="matrix"></canvas>

  <!-- Overlay -->
  <div id="overlay" class="hidden">
    <div id="headline">initializing access sequence</div>
    <div id="accessSection">
      <a href="index.html" style="text-decoration:none;"><div class="glitch" data-text="ACCESS GRANTED">ACCESS GRANTED</div></a>
      <div id="code-box">loading code...</div>
      <img src="http://rkeaves.online/assets/tornado.webp" alt="tornado hint" class="hint-img"/>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    // Grab elements
    const intro = document.getElementById('intro');
    const particlesEl = document.getElementById('particles-js');
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const headline = document.getElementById('headline');
    const accessSection = document.getElementById('accessSection');
    const codeBox = document.getElementById('code-box');

    let started = false;

    // Responsive canvas
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    // Physics settings
    const GRAVITY = 0.2;
    const FRICTION = 0.85;
    let drops = [];
    const letters = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

    // Initialize drop positions with velocity
    function initMatrix() {
      resizeCanvas();
      const fontSize = 20;
      const cols = Math.floor(canvas.width / fontSize);
      drops = [];
      for (let i = 0; i < cols; i++) {
        drops.push({
          x: i * fontSize,
          y: Math.random() * -canvas.height,
          vx: (Math.random() - 0.5) * 2,
          vy: Math.random() * 2,
          char: ''
        });
      }
      ctx.font = `${fontSize}px monospace`;
    }

    // Draw and update drops with gravity and bounce
    function drawMatrix() {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drops.forEach(drop => {
        // physics
        drop.vy += GRAVITY;
        drop.x += drop.vx;
        drop.y += drop.vy;
        // bounce off bottom
        if (drop.y > canvas.height) {
          drop.y = canvas.height;
          drop.vy *= -FRICTION;
          drop.vx *= FRICTION;
        }
        // bounce off sides
        if (drop.x < 0 || drop.x > canvas.width) {
          drop.vx *= -FRICTION;
        }
        // pick a random character
        drop.char = letters.charAt(Math.floor(Math.random() * letters.length));
        // draw head
        ctx.fillStyle = '#ffffff';
        ctx.fillText(drop.char, drop.x, drop.y);
        // draw trail
        ctx.fillStyle = '#7CFC00';
        ctx.fillText(drop.char, drop.x, drop.y - 22);
      });
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      drawMatrix();
    }

    // Click handler to start everything
    intro.addEventListener('click', () => {
      if (started) return;
      started = true;
      // show background effects
      particlesEl.style.display = 'block';
      canvas.style.display = 'block';
      // fade out intro
      intro.style.transition = 'opacity 0.8s ease-out, transform 0.8s ease-out';
      intro.style.opacity = '0';
      intro.style.transform = 'translate(-50%, -50%) scale(0.8)';
      setTimeout(() => intro.remove(), 800);
      // init and start animations
      initParticles();
      initMatrix();
      animate();
      // overlay sequence
      setTimeout(() => {
        overlay.classList.remove('hidden');
        overlay.style.opacity = '1';
        headline.style.animation = 'marquee 12s linear forwards';
        setTimeout(() => {
          headline.style.display = 'none';
          accessSection.style.display = 'flex';
          accessSection.style.opacity = '1';
        }, 11000);
      }, 2000);
      // fetch code
      setTimeout(fetchCode, 12000);
    });

    // Initialize Particles.js
    function initParticles() {
      particlesJS('particles-js', {
        particles: {
          number: { value: 50, density: { enable: true, value_area: 1200 } },
          color: { value: '#7CFC00' },
          opacity: { value: 0.3 },
          size: { value: 2 },
          line_linked: { enable: false },
          move: { enable: true, speed: 1 }
        }
      });
    }

    // Fetch code text
    function fetchCode() {
      fetch('https://files.catbox.moe/myrqma.txt')
        .then(res => res.text())
        .then(txt => {
          codeBox.textContent = 'access code: ' + txt.trim();
          codeBox.style.display = 'block';
        })
        .catch(() => {
          codeBox.textContent = 'access code: [FAILED TO LOAD]';
          codeBox.style.display = 'block';
        });
    }
  </script>
</body>
</html>
