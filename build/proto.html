<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~cache vault</title>
<style>
/* ==============================
   BASE STYLES
================================= */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: 'Courier New', Courier, monospace;
}

#matrixCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: black;
}

.container {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

h1.glitch {
  font-size: 4em;
  color: #0f0;
  text-transform: uppercase;
  text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
  animation: flicker 2s infinite alternate;
  margin: 0;
  position: relative;
}
h1.glitch::before, h1.glitch::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  overflow: hidden;
}
h1.glitch::before {
  left: 2px;
  text-shadow: -2px 0 #f0f;
  animation: glitch-top 3s infinite linear;
}
h1.glitch::after {
  left: -2px;
  text-shadow: -2px 0 #0f0;
  animation: glitch-bottom 3s infinite linear;
}

@keyframes flicker {
  0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
  20%,24%,55% { opacity: 0.6; }
}
@keyframes glitch-top {
  0%,100%{clip:rect(0,900px,5px,0);}
  50%{clip:rect(10px,900px,15px,0);}
}
@keyframes glitch-bottom {
  0%,100%{clip:rect(30px,900px,35px,0);}
  50%{clip:rect(40px,900px,45px,0);}
}

nav.top-nav {
  position: fixed;
  top: 0;
  left: 10%;
  right: 10%;
  z-index: 3;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 1em 0;
}
nav.top-nav a {
  color: #0f0;
  font-weight: bold;
  font-size: 1.2em;
  text-shadow: 0 0 5px #0f0;
  text-decoration: none;
  transition: all 0.3s;
}
nav.top-nav a:hover {
  transform: scale(1.1);
  text-shadow: 0 0 15px #0f0;
}

/* Floating Buttons */
.links {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
}
.links a {
  position: absolute;
  display: inline-block;
  margin: 10px;
  padding: 0.6em 1em;
  color: #0f0;
  font-size: 1.1em;
  text-decoration: none;
  border: 1px solid #0f0;
  background: transparent;
  box-shadow: 0 0 10px #0f0;
  transition: all 0.3s;
  pointer-events: auto;
}
.links a:hover {
  transform: scale(1.1);
  background: rgba(0, 255, 0, 0.1);
}
</style>
</head>

<body>

<nav class="top-nav">
  <a href="/redacted">index</a>
  <a href="/cache">vault</a>
  <a href="/star">star</a>
  <a href="/blog">blog</a>
  <a href="/secret">secret</a>
  <a href="/games">games</a>
</nav>

<canvas id="matrixCanvas"></canvas>

<div class="container">
  <h1 class="glitch" data-text="CACHE VAULT">CACHE VAULT</h1>
</div>

<div class="links">
  <a href="/snake">Snake</a>
  <a href="/tetris">Tetris</a>
  <a href="/wait">?</a>
  <a href="/cache.html">Cache</a>
</div>

<script>
// --- Matrix Effect ---
window.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');
  
  const katakana = 'アィイゥウェエォオカガキギクグケゲコゴサザシジスズセゼソゾタダチッヂヅテデトドナニヌネノハバパヒビピフブプヘベペホボポマミムメモヤユヨラリルレロワヲン'.split('');
  
  const fontSize = 16;
  const columns = Math.floor(window.innerWidth / fontSize);
  const drops = Array(columns).fill(1);

  const resizeCanvas = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  };
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = `${fontSize}px 'Courier New', Courier, monospace`;

    for (let i = 0; i < drops.length; i++) {
      const text = katakana[Math.floor(Math.random() * katakana.length)];
      ctx.fillStyle = '#0F0';
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  draw();

  // --- Floating Links Drift ---
  const links = document.querySelectorAll('.links a');
  links.forEach(link => {
    const move = () => {
      const x = Math.random() * (window.innerWidth - link.offsetWidth);
      const y = Math.random() * (window.innerHeight - link.offsetHeight);
      link.style.left = `${x}px`;
      link.style.top = `${y}px`;
      setTimeout(move, 4000 + Math.random() * 3000);
    };
    move();
  });

  // --- Canvas Fade on Mouse Move ---
  let fadeTimeout;
  window.addEventListener('mousemove', () => {
    canvas.style.opacity = '0.3';
    canvas.style.filter = 'blur(1.5px)';
    clearTimeout(fadeTimeout);
    fadeTimeout = setTimeout(() => {
      canvas.style.opacity = '1';
      canvas.style.filter = 'none';
    }, 1200);
  });

  // --- Login Cookie Check ---
  const cookies = document.cookie.split('; ');
  if (!cookies.some(c => c.startsWith('is_logged_in='))) {
    window.location.href = 'index.html';
  }
});
</script>

</body>
</html>
