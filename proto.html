<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~cache vault</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: 'Courier New', Courier, monospace;
}
#matrixCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  transition: opacity 0.6s ease, filter 1s ease;
}
.container {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}
h1.glitch {
  font-size: 4em;
  color: #0f0;
  text-transform: uppercase;
  text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
  animation: flicker 2s infinite alternate;
  position: relative;
  margin: 0;
}
h1.glitch::before, h1.glitch::after {
  content: attr(data-text);
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  overflow: hidden;
  clip: rect(0, 900px, 0, 0);
}
h1.glitch::before {
  left: 2px;
  text-shadow: -2px 0 #f0f;
  animation: glitch-top 3s infinite linear;
}
h1.glitch::after {
  left: -2px;
  text-shadow: -2px 0 #0f0;
  animation: glitch-bottom 2.5s infinite linear;
}
@keyframes flicker {
  0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
  20%,24%,55% { opacity: 0.6; }
}
@keyframes glitch-top {
  0%{clip:rect(0,900px,5px,0);} 50%{clip:rect(10px,900px,15px,0);} 100%{clip:rect(0,900px,5px,0);}
}
@keyframes glitch-bottom {
  0%{clip:rect(30px,900px,35px,0);} 50%{clip:rect(40px,900px,45px,0);} 100%{clip:rect(30px,900px,35px,0);}
}
nav.top-nav {
  position: fixed;
  top: 0;
  left: 15%;
  right: 15%;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 1em 0;
  z-index: 3;
}
nav.top-nav a {
  color: #0f0;
  font-weight: bold;
  text-decoration: none;
  font-size: 1.2em;
  text-shadow: 0 0 5px #0f0;
  transition: all 0.3s;
}
nav.top-nav a:hover {
  transform: scale(1.05);
  text-shadow: 0 0 10px #0f0;
}
.links a {
  position: absolute;
  padding: 0.7em 1.2em;
  color: #0f0;
  font-size: 1.2em;
  text-decoration: none;
  border: 1px solid #0f0;
  box-shadow: 0 0 8px #0f0;
  background: transparent;
  opacity: 0.8;
  transition: all 0.3s;
  z-index: 2;
}
.links a:hover {
  transform: scale(1.1);
  opacity: 1;
}
</style>
</head>

<body>

<nav class="top-nav">
  <a href="/redacted">index</a>
  <a href="/cache">vault</a>
  <a href="/star">star</a>
  <a href="/blog">blog</a>
  <a href="/secret">secret</a>
  <a href="/games">games</a>
</nav>

<canvas id="matrixCanvas"></canvas>

<div class="container">
  <h1 class="glitch" data-text="CACHE VAULT">CACHE VAULT</h1>
</div>

<div class="links">
  <a href="/snake">Snake</a>
  <a href="/tetris">Tetris</a>
  <a href="/wait">?</a>
  <a href="/cache.html">Cache</a>
</div>

<script>
// --- Login Check ---
(function() {
  const cookies = document.cookie.split('; ');
  if (!cookies.some(c => c.startsWith('is_logged_in='))) {
    window.location.href = 'index.html';
  }
})();

// --- Matrix Setup ---
window.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  // Matrix Character Set: Japanese Katakana + mapped for all systems
  const katakana = 'アィイゥウェエォオカガキギクグケゲコゴサザシジスズセゼソゾタダチッヂヅテデトドナニヌネノハバパヒビピフブプヘベペホボポマミムメモヤユヨラリルレロワヲン'.split('');

  let drops = [];
  const setupMatrix = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const columns = Math.floor(canvas.width / 16);
    drops = Array(columns).fill(1);
  };

  window.addEventListener('resize', setupMatrix);
  setupMatrix();

  const drawMatrix = () => {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '16px "Courier New", Courier, monospace';
    for (let i = 0; i < drops.length; i++) {
      const char = katakana[Math.floor(Math.random() * katakana.length)];
      const x = i * 16;
      const y = drops[i] * 16;
      ctx.fillStyle = Math.random() < 0.005 ? '#fff' : '#0f0';
      ctx.fillText(char, x, y);
      drops[i] = (y > canvas.height && Math.random() > 0.975) ? 0 : drops[i] + 1;
    }
    requestAnimationFrame(drawMatrix);
  };
  drawMatrix();

  // --- Mouse Blur Fade ---
  let fadeTimeout;
  window.addEventListener('mousemove', () => {
    canvas.style.opacity = '0.4';
    canvas.style.filter = 'blur(1.5px)';
    clearTimeout(fadeTimeout);
    fadeTimeout = setTimeout(() => {
      canvas.style.opacity = '1';
      canvas.style.filter = 'none';
    }, 1500);
  });

  // --- Floating Links Smooth Drift ---
  const buttons = document.querySelectorAll('.links a');
  buttons.forEach(btn => {
    const drift = () => {
      const x = Math.random() * (window.innerWidth - btn.offsetWidth);
      const y = Math.random() * (window.innerHeight - btn.offsetHeight);
      btn.style.transform = `translate(${x}px, ${y}px)`;
      setTimeout(drift, 5000 + Math.random() * 3000);
    };
    drift();
  });
});
</script>

</body>
</html>
