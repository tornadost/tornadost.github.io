<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>~cache</title>
  <style>
    :root {
      --neon-green: #0f0;
      --neon-pink: #f0f;
      --matrix-speed: 60;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      cursor: none;
    }
    #matrixCanvas {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      opacity: 0.95;
      mix-blend-mode: screen;
      z-index: 1;
      transition: opacity 1.2s ease, filter 1.5s ease;
    }
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
    }
    h1.glitch {
      font-size: 4em;
      text-transform: uppercase;
      color: var(--neon-green);
      text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
      animation: hologram 6s infinite;
      position: relative;
    }
    h1.glitch::before, h1.glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      opacity: 0.7;
      overflow: hidden;
    }
    h1.glitch::before {
      color: var(--neon-pink);
      clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
      animation: glitch-top 2s infinite alternate;
    }
    h1.glitch::after {
      color: var(--neon-green);
      clip-path: polygon(0 66%, 100% 66%, 100% 100%, 0 100%);
      animation: glitch-bottom 3s infinite alternate;
    }
    @keyframes glitch-top {
      0% { transform: translate(0, 0); }
      50% { transform: translate(2px, -2px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes glitch-bottom {
      0% { transform: translate(0, 0); }
      50% { transform: translate(-2px, 2px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes hologram {
      0%, 100% { transform: translateZ(0) rotateX(0deg) rotateY(0deg); }
      50% { transform: translateZ(30px) rotateX(2deg) rotateY(2deg); }
    }
  </style>
</head>

<body>
  <canvas id="matrixCanvas"></canvas>
  <div class="container">
    <h1 class="glitch" data-text="~cache">~cache</h1>
  </div>

<script>
(function() {
  const cookies = document.cookie.split('; ');
  if (!cookies.some(c => c.startsWith('is_logged_in='))) {
    window.location.href = 'index.html';
  }
})();

class MatrixRain {
  constructor(canvasId) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.columns = 0;
    this.drops = [];
    this.katakana = ['ﾊ','ﾐ','ﾋ','ｰ','ｳ','ｼ','ﾅ','ﾓ','ﾆ','ｻ','ﾜ','ﾂ','ｵ','ﾘ','ｱ','ﾎ','ﾃ','ﾏ','ｹ','ﾒ','ﾕ','ﾗ','ｾ','ﾈ','ｽ','ﾔ'];
    this.charSet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()'.split('');
    this.resizeDebounce = null;
    this.init();
  }

  init() {
    this.resize();
    this.createDrops();
    this.animate();
    window.addEventListener('resize', () => {
      clearTimeout(this.resizeDebounce);
      this.resizeDebounce = setTimeout(() => {
        this.resize();
        this.createDrops();
      }, 200);
    }, {passive: true});
  }

  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.columns = Math.floor(this.canvas.width / 20);
  }

  createDrops() {
    this.drops = Array(this.columns).fill().map(() => ({
      y: Math.random() * this.canvas.height,
      speed: 2 + Math.random() * 3,
      alpha: 0.4 + Math.random() * 0.5,
      font: 12 + Math.random() * 8,
      charSet: Math.random() > 0.7 ? this.katakana : this.charSet
    }));
  }

  drawBackground() {
    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.07)';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
  }

  drawDrop(drop, x) {
    const char = drop.charSet[Math.floor(Math.random() * drop.charSet.length)];
    this.ctx.font = `${drop.font}px 'Courier New', monospace`;
    this.ctx.fillStyle = `hsla(120, 100%, 50%, ${drop.alpha})`;
    this.ctx.fillText(char, x, drop.y);

    // Trailing effect
    const gradient = this.ctx.createLinearGradient(x, drop.y - 50, x, drop.y);
    gradient.addColorStop(0, 'rgba(0,255,0,0)');
    gradient.addColorStop(1, `hsla(120, 100%, 50%, ${drop.alpha * 0.2})`);
    this.ctx.fillStyle = gradient;
    this.ctx.fillText(char, x, drop.y);
  }

  animate() {
    this.drawBackground();
    this.drops.forEach((drop, i) => {
      const x = i * 20;
      this.drawDrop(drop, x);
      drop.y += drop.speed;
      if (drop.y > this.canvas.height + 20) {
        drop.y = -20;
        drop.alpha = 0.4 + Math.random() * 0.5;
        drop.speed = 2 + Math.random() * 3;
      }
      if (Math.random() > 0.98) {
        drop.charSet = Math.random() > 0.5 ? this.katakana : this.charSet;
      }
    });

    // Tiny glitch effect
    if (Math.random() > 0.985) {
      this.ctx.globalCompositeOperation = 'xor';
      setTimeout(() => {
        this.ctx.globalCompositeOperation = 'screen';
      }, 60);
    }

    requestAnimationFrame(() => this.animate());
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const matrix = new MatrixRain('matrixCanvas');

  let blurTimeout;
  window.addEventListener('mousemove', () => {
    matrix.canvas.style.opacity = '0.3';
    matrix.canvas.style.filter = 'blur(2px)';
    clearTimeout(blurTimeout);
    blurTimeout = setTimeout(() => {
      matrix.canvas.style.opacity = '0.95';
      matrix.canvas.style.filter = 'blur(0)';
    }, 1200);
  }, {passive: true});
});
</script>
</body>
</html>
