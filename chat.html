<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>~chat</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      background: #000;
    }
    #matrixCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      transition: opacity 0.5s ease-in-out;
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    #discord-widget {
      width: 40vw;
      height: 60vh;
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 0 20px rgba(0,255,0,0.5);
      border: 1px solid #0f0;
      border-radius: 8px;
      overflow: hidden;
    }
    #discord-widget iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .links a {
      position: absolute;
      padding: 0.8em 1.5em;
      color: #0f0;
      text-decoration: none;
      font-size: 1.2em;
      background: transparent;
      box-shadow: 0 0 10px rgba(0,255,0,0.7);
      opacity: 0.7;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 2;
      animation: pulse 2.5s infinite;
    }
    .links a:hover {
      opacity: 1;
      transform: scale(1.2) rotate(2deg);
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 5px rgba(0,255,0,0.7); }
      50%      { box-shadow: 0 0 20px rgba(0,255,0,1); }
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 15%;
      right: 15%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1em 0;
      z-index: 3;
      background: transparent;
    }
    .top-nav a {
      position: relative;
      color: #0f0;
      text-decoration: none;
      font-size: 1.2em;
      font-weight: bold;
      letter-spacing: 0.05em;
      text-shadow: 0 0 5px #0f0, 0 0 10px #0f0;
      opacity: 0.85;
      transition: transform 0.2s ease-out, opacity 0.2s ease-out;
      animation: float 3s ease-in-out infinite, flickerText 4s infinite;
      padding-bottom: 0.2em;
    }
    .top-nav a::after {
      content: '';
      position: absolute;
      left: 0; bottom: 0;
      width: 0; height: 2px;
      background: #0f0;
      box-shadow: 0 0 8px #0f0, 0 0 12px #0f0;
      transition: width 0.3s ease-out;
    }
    .top-nav a:hover {
      transform: scale(1.06) translateY(-2px);
      opacity: 1;
    }
    .top-nav a:hover::after {
      width: 100%;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1) rotate(0); }
      50%     { transform: translateY(-4px) scale(1.02) rotate(0.5deg); }
    }
    @keyframes flickerText {
      0%,18%,22%,55%,100% { opacity: 0.9; }
      20%,50%              { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <script>
    (function() {
      const cookies = document.cookie.split('; ');
      const loggedIn = cookies.some(c => c.startsWith('is_logged_in='));
      if (!loggedIn) window.location.replace('index.html');
    })();
  </script>

  <nav class="top-nav">
    <a href="/redacted" id="link1">index</a>
    <a href="/layer/cache" id="link2">vault</a>
    <a href="/layer/star" id="link3">star</a>
    <a href="/feed/blog" id="link4">blog</a>
    <a href="/layer/archive" id="link5">secret</a>
    <a href="/games/play" id="link6">play</a>
  </nav>

  <canvas id="matrixCanvas"></canvas>

  <div class="container">
    <div id="discord-widget">
      <iframe
        src="https://discord.com/widget?id=1339396287061168232&theme=dark"
        allowtransparency="true"
        sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
      </iframe>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');
      let cols, drops;

      const setupMatrix = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cols = Math.floor(canvas.width / 14);
        drops = Array(cols).fill(1);
      };
      window.addEventListener('resize', setupMatrix);
      setupMatrix();

      function drawMatrix() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.07)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < drops.length; i++) {
          const x = i * 14, y = drops[i] * 14;
          const char = String.fromCharCode(0x30A0 + Math.random() * 96);
          ctx.fillStyle = Math.random() < 0.005 ? '#FFF' : '#0F0';
          ctx.font = (14 + Math.random() * 4) + 'px monospace';
          ctx.fillText(char, x, y);
          drops[i] = y > canvas.height && Math.random() > 0.98 ? 0 : drops[i] + 1;
        }
        requestAnimationFrame(drawMatrix);
      }
      drawMatrix();

      let fadeTimeout;
      window.addEventListener('mousemove', () => {
        canvas.style.opacity = '0.3';
        clearTimeout(fadeTimeout);
        fadeTimeout = setTimeout(() => {
          canvas.style.opacity = '1';
        }, 2000);
      });

      const buttons = Array.from(document.querySelectorAll('.links a'));
      const box = document.getElementById('discord-widget');
      function moveButton(btn) {
        const t = box.getBoundingClientRect();
        let x, y;
        do {
          x = Math.random() * (window.innerWidth - btn.offsetWidth);
          y = Math.random() * (window.innerHeight - btn.offsetHeight);
        } while (
          x < t.right + 20 && x + btn.offsetWidth > t.left - 20 &&
          y < t.bottom + 20 && y + btn.offsetHeight > t.top - 20
        );
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
        setTimeout(() => moveButton(btn), 2000 + Math.random() * 2000);
      }
      buttons.forEach(moveButton);
    });
  </script>
</body>
</html>
