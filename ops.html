<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>~chat</title>
  <style>
    /* Reset & Fullscreen */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Courier New', monospace; background: #000; }

    /* Matrix Canvas */
    #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transition: opacity .5s ease-in-out; }

    /* Centered Chat Container */
    .container { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; height: 100vh; }

    /* Make widgetbot block‑level so sizing works */
    widgetbot {
      display: block; /* ← critical for width/height to apply */ :contentReference[oaicite:6]{index=6}
      width: 40vw;
      height: 60vh;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,255,0,0.5);
      border: 1px solid #0f0;
      background: rgba(0,0,0,0.8);
      overflow: hidden;
    }

    /* Navigation & Links (unchanged) */
    /* … your existing .top-nav and .links CSS … */
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <!-- … your nav links … -->
  </nav>

  <!-- Matrix Background -->
  <canvas id="matrixCanvas"></canvas>

  <!-- Chat Widget -->
  <div class="container">
    <widgetbot
      server="1339396287061168232"
      channel="1339432343320137738"
      id="chat"
    ></widgetbot>
    <!-- Load html‑embed after the element per docs -->
    <script
      src="https://cdn.jsdelivr.net/npm/@widgetbot/html-embed"
      defer
    ></script>
  </div>

  <!-- Floating Links -->
  <div class="links">
    <!-- … your floating links … -->
  </div>

  <!-- Matrix & Links Script -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // … your existing matrix and floating‑links code …
    });
  </script>
</body>
</html>
