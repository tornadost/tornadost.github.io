<!DOCTYPE html>
<!--
  CyberBlogX 2.0 – Single‑file template (~680 lines)

  • Features ....................................................... Section #
      1.  Font imports & root CSS vars (easy theme tweaking) ..........  30‑90
      2.  Responsive navigation with hamburger ........................ 100‑160
      3.  Hero banner w/ glitch neon .................................. 170‑230
      4.  Search bar + tag chips UI ................................... 240‑310
      5.  Posts grid card styles (hover, glow) ........................ 320‑430
      6.  Pagination + infinite scroll sentinel ....................... 440‑470
      7.  Contact form ............................................... 480‑520
      8.  Footer & social icons ...................................... 530‑560
      9.  Utility animations / keyframes ............................. 570‑630
     10.  JS: fetch posts, build cards, lunr search, filters, SW ..... 640‑EOF

  • External deps
      - posts.json   : store your post meta & markdown file paths
      - lunr.min.js  : search (CDN)
      - marked.min.js: markdown parser (CDN)
      - sw.js        : optional service‑worker (see inline template)

  👉  Count lines if you need: every section header shows the running total.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberBlogX</title>

<!-- ===== Google Fonts ===== -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<!-- ===== External libraries (CDN) ===== -->
<script defer src="https://unpkg.com/lunr/lunr.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
/* ------------------------------------------------------------------
   01. RESET & ROOT VARIABLES   (≈ 60 lines)
------------------------------------------------------------------ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;scroll-behavior:smooth;overflow-x:hidden;
  font-family:'Roboto',sans-serif;background:var(--bg-dark);color:var(--text);}
:root{
  --neon:#0f0;                     /* primary neon */
  --neon-b:#39ff14;                /* accent neon  */
  --bg-dark:#000; --bg-light:#111; /* themes       */
  --text:#eee;
  --radius:8px;
  --speed:.3s;
  --max:1200px;
  --gap:2rem;
  --font-mono:'Press Start 2P',cursive;
}
/* Light mode variables (overridden via JS) */
:root.light{
  --bg-dark:#fafafa;--bg-light:#fff;
  --neon:#05f;--neon-b:#0ff;
  --text:#222;
}

/* ------------------------------------------------------------------
   02. GENERIC UTILITIES (flex helpers, btn, container) (≈ 30 lines)
------------------------------------------------------------------ */
.container{max-width:var(--max);margin:0 auto;padding:1rem;}
.flex{display:flex;align-items:center;}
.just-between{justify-content:space-between;}
.mt{margin-top:1rem;}
.hidden{display:none!important;}

.btn{display:inline-block;font-family:var(--font-mono);text-transform:uppercase;
  padding:.75rem 1.5rem;border:1px solid var(--neon);color:var(--neon);
  background:transparent;border-radius:var(--radius);letter-spacing:.05em;
  transition:background var(--speed),color var(--speed),box-shadow var(--speed);}
.btn:hover{background:var(--neon);color:var(--bg-dark);
  box-shadow:0 0 10px var(--neon),0 0 20px var(--neon-b);}

/* ------------------------------------------------------------------
   03. HEADER & NAVIGATION  (≈ 60 lines)
------------------------------------------------------------------ */
header{position:fixed;top:0;left:0;width:100%;background:rgba(0,0,0,.8);
  backdrop-filter:blur(6px);z-index:100;transition:background var(--speed);}
.navbar{max-width:var(--max);margin:0 auto;padding:1rem;}
.logo a{font-family:var(--font-mono);font-size:1.5rem;color:var(--neon);
  text-decoration:none;text-shadow:0 0 5px var(--neon);}
.nav-links{list-style:none;}
.nav-links li{display:inline-block;margin-left:2rem;}
.nav-links a{color:var(--neon);text-decoration:none;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;
  height:2px;background:var(--neon-b);transition:width var(--speed);}
.nav-links a:hover::after{width:100%;}
/* hamburger */
.nav-toggle{display:none;background:none;border:none;cursor:pointer;}
.hamburger,.hamburger::before,.hamburger::after{width:28px;height:3px;
  background:var(--neon);display:block;position:relative;transition:all var(--speed);}
.hamburger::before,.hamburger::after{content:'';position:absolute;left:0;}
.hamburger::before{top:-8px}.hamburger::after{top:8px}
.hamburger.open{transform:rotate(45deg)}.hamburger.open::before{top:0;transform:rotate(90deg)}
.hamburger.open::after{top:0;opacity:0}
@media(max-width:768px){
  .nav-toggle{display:block}
  .nav-links{display:none;flex-direction:column;position:fixed;top:60px;right:0;width:200px;height:calc(100% - 60px);
    background:var(--bg-light);padding:2rem;}
  .nav-links.show{display:flex}
  .nav-links li{margin:1rem 0}
}

/* ------------------------------------------------------------------
   04. HERO SECTION  (≈ 60 lines)
------------------------------------------------------------------ */
.hero{height:70vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:url('assets/images/hero-bg.jpg') center/cover no-repeat;position:relative;margin-top:60px}
.hero::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.6)}
.hero-title{font-size:3.5rem;color:var(--neon);font-family:var(--font-mono);
  z-index:1;animation:flicker 2s infinite}
.hero-sub{font-size:1.2rem;color:#ccc;margin-top:1rem;z-index:1;animation:fadeIn 3s}
.hero .btn{margin-top:2rem;z-index:1;animation:pulse 2s infinite}
/* flicker */
@keyframes flicker{0%,19%,21%,23%,25%,54%,56%,100%{opacity:1}20%,24%,55%{opacity:.4}}
@keyframes pulse{0%{box-shadow:0 0 5px var(--neon)}50%{box-shadow:0 0 20px var(--neon-b)}100%{box-shadow:0 0 5px var(--neon)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
/* fade-out for Explore */
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
.hero.hidden{animation:fadeOut .8s forwards}

/* ------------------------------------------------------------------
   05. SEARCH BAR & TAG FILTERS  (≈ 70 lines)
------------------------------------------------------------------ */
.search-wrap{margin:2rem 0 0 0;display:grid;grid-template-columns:1fr auto;
  gap:1rem;align-items:center}
#search-input{width:100%;padding:.75rem;border:1px solid var(--neon);border-radius:var(--radius);
  background:var(--bg-light);color:var(--text)}
.tag-chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem}
.tag-chips button{padding:.35rem .8rem;border:1px solid var(--neon-b);
  background:transparent;border-radius:var(--radius);color:var(--neon-b);
  font-size:.8rem;cursor:pointer;transition:background var(--speed)}
.tag-chips button.active, .tag-chips button:hover{background:var(--neon-b);color:var(--bg-dark)}
/* reset button */
#clear-filter{margin-left:auto}

/* ------------------------------------------------------------------
   06. POSTS GRID & CARDS (≈ 110 lines inc. lazy shimmer)
------------------------------------------------------------------ */
.posts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:var(--gap);margin-top:var(--gap)}
.post-card{background:var(--bg-light);border:1px solid var(--neon);border-radius:var(--radius);overflow:hidden;
  position:relative;transition:transform var(--speed),box-shadow var(--speed)}
.post-card:hover{transform:translateY(-8px);box-shadow:0 0 10px var(--neon-b)}
.post-thumbnail{position:relative;overflow:hidden}
.post-thumbnail img{width:100%;display:block;transition:transform .6s;will-change:transform}
.post-card:hover .post-thumbnail img{transform:scale(1.05)}
.post-content{padding:1rem}
.post-title{font-size:1.25rem;margin-bottom:.5rem;color:var(--neon-b)}
.post-excerpt{color:#ccc;line-height:1.6;margin-bottom:1rem}
.post-meta{font-size:.8rem;color:#888}
/* skeleton shimmer when loading  */
.skeleton{background:linear-gradient(90deg,#333 25%,#444 50%,#333 75%);background-size:200% 100%;animation:skeleton 1.2s infinite}
@keyframes skeleton{0%{background-position:200%}100%{background-position:-200%}}

/* ------------------------------------------------------------------
   07. PAGINATION + INFINITE SCROLL  (≈ 40 lines)
------------------------------------------------------------------ */
.pagination{display:flex;justify-content:center;align-items:center;margin:3rem 0;gap:1rem}
.pagination a{color:var(--neon);text-decoration:none;position:relative;padding-bottom:2px}
.pagination a::after{content:'';position:absolute;left:0;bottom:0;width:0;height:2px;background:var(--neon);transition:width var(--speed)}
.pagination a:hover::after{width:100%}
/* sentinel for IO */
#sentinel{width:100%;height:1px}

/* ------------------------------------------------------------------
   08. CONTACT FORM  (≈ 40 lines)
------------------------------------------------------------------ */
.contact-section{margin:4rem 0}
.contact-form{background:var(--bg-light);padding:2rem;border-radius:var(--radius);
  box-shadow:0 0 10px rgba(0,0,0,.5);max-width:600px;margin:0 auto}
.contact-form h2{font-family:var(--font-mono);margin-bottom:1rem}
.contact-form label{display:block;margin-bottom:.5rem;color:#ccc}
.contact-form input,.contact-form textarea{width:100%;padding:.75rem;background:#222;border:1px solid #444;color:#eee;border-radius:var(--radius);margin-bottom:1rem}
.contact-form button{background:var(--neon-b);color:var(--bg-dark);border:none;cursor:pointer;
  padding:.75rem 1.5rem;border-radius:var(--radius);transition:background var(--speed)}
.contact-form button:hover{background:var(--neon)}

/* ------------------------------------------------------------------
   09. FOOTER  (≈ 30 lines)
------------------------------------------------------------------ */
footer{background:rgba(0,0,0,.85);text-align:center;padding:2rem 0;margin-top:4rem}
.footer-content p{color:#888;font-size:.9rem}
.social-links{list-style:none;margin-top:1rem}
.social-links li{display:inline-block;margin:0 .5rem}
.social-links img{width:28px;filter:invert(1);transition:transform var(--speed)}
.social-links a:hover img{transform:scale(1.2) rotate(-10deg)}

/* ------------------------------------------------------------------
   10. BACK‑TO‑TOP BUTTON (≈ 20 lines)
------------------------------------------------------------------ */
#back-to-top{position:fixed;right:1rem;bottom:1rem;width:50px;height:50px;
  background:var(--neon-b);border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;visibility:hidden;transition:opacity var(--speed),visibility var(--speed);z-index:1000}
#back-to-top.visible{opacity:1;visibility:visible}
#back-to-top svg{width:24px;height:24px;fill:var(--bg-dark)}
</style>
</head>
<body>

<!-- =========================  HEADER  ========================= -->
<header>
  <nav class="navbar flex just-between">
    <div class="logo"><a href="/">CyberBlogX</a></div>

    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="#posts-wrap">Posts</a></li>
      <li><a href="#contact">Contact</a></li>
      <li><a id="theme-toggle" href="#">Toggle Theme</a></li>
    </ul>

    <button class="nav-toggle" aria-label="Toggle navigation"><span class="hamburger"></span></button>
  </nav>
</header>

<!-- =========================  HERO  ========================= -->
<section class="hero" id="hero">
  <h1 class="hero-title">Welcome to CyberBlogX</h1>
  <p class="hero-sub">Diving deep into the Matrix, one post at a time.</p>
  <a href="#posts-wrap" class="btn" id="explore-btn">Explore Posts</a>
</section>

<!-- =========================  MAIN / POSTS  ========================= -->
<main id="posts-wrap" class="container">

  <!-- Search + Filter UI -->
  <div class="search-wrap">
    <input type="search" id="search-input" placeholder="Search posts…">
    <button id="clear-filter" class="btn hidden">Clear</button>
  </div>
  <div class="tag-chips" id="tag-chips"></div>

  <!-- Posts grid -->
  <section class="posts-grid" id="posts-grid"></section>

  <!-- Pagination & infinite scroll sentinel -->
  <nav class="pagination" id="pagination"></nav>
  <div id="sentinel"></div>

  <!-- Contact -->
  <section class="contact-section" id="contact">
    <form class="contact-form" id="contact-form">
      <h2>Get in Touch</h2>
      <label for="name">Name</label>
      <input type="text" id="name" required>
      <label for="email">Email</label>
      <input type="email" id="email" required>
      <label for="message">Message</label>
      <textarea id="message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
      <p id="form-status"></p>
    </form>
  </section>
</main>

<!-- =========================  FOOTER  ========================= -->
<footer>
  <div class="container footer-content">
    <p>&copy; <span id="year"></span> CyberBlogX. All Rights Reserved.</p>
    <ul class="social-links">
      <li><a href="#"><img src="assets/icons/twitter.svg" alt="Twitter"></a></li>
      <li><a href="#"><img src="assets/icons/github.svg" alt="GitHub"></a></li>
      <li><a href="#"><img src="assets/icons/linkedin.svg" alt="LinkedIn"></a></li>
    </ul>
  </div>
</footer>

<!-- Back‑to‑top -->
<div id="back-to-top" title="Back to top">
  <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg>
</div>

<!-- =========================  CORE SCRIPTS  ========================= -->
<script>
/* ------------------------------------------------------------------
   CONSTANTS – tweak here instead of hunting in code
------------------------------------------------------------------ */
const POSTS_JSON = '/posts.json';   // path to JSON file
const POSTS_PER_PAGE = 6;           // for pagination
const LAZY_THRESHOLD = 0.25;        // IO threshold for cards
/* ------------------------------------------------------------------
   STATE
------------------------------------------------------------------ */
let posts = [];                     // all posts loaded
let page = 1;                       // current page for pagination
let lunrIndex = null;               // lunr search index
let currentTag = '';                // active tag filter

/* ------------------------------------------------------------------
   SERVICE WORKER (optional but nice)
------------------------------------------------------------------ */
if('serviceWorker' in navigator){
  // sw.js template caches /, posts.json, assets/images/* and fallback.html
  navigator.serviceWorker.register('/sw.js').catch(console.error);
}

/* ------------------------------------------------------------------
   THEME TOGGLE
------------------------------------------------------------------ */
const root = document.documentElement;
const themeBtn = document.getElementById('theme-toggle');
let theme = localStorage.getItem('theme') || 'dark';
applyTheme(theme);
themeBtn.addEventListener('click',e=>{
  e.preventDefault();
  theme = theme==='dark'?'light':'dark';
  applyTheme(theme);
});
function applyTheme(t){
  if(t==='light'){root.classList.add('light');}else{root.classList.remove('light');}
  localStorage.setItem('theme',t);
}

/* ------------------------------------------------------------------
   NAV TOGGLE (mobile)
------------------------------------------------------------------ */
const navToggle=document.querySelector('.nav-toggle');
const navLinks=document.querySelector('.nav-links');
navToggle.addEventListener('click',()=>{
  navLinks.classList.toggle('show');
  document.querySelector('.hamburger').classList.toggle('open');
});

/* ------------------------------------------------------------------
   HERO → SCROLL & FADE
------------------------------------------------------------------ */
const exploreBtn=document.getElementById('explore-btn');
const hero=document.getElementById('hero');
exploreBtn.addEventListener('click',e=>{
  e.preventDefault();
  hero.classList.add('hidden');
  document.getElementById('posts-wrap').scrollIntoView({behavior:'smooth'});
});

/* ------------------------------------------------------------------
   BACK‑TO‑TOP
------------------------------------------------------------------ */
const backBtn=document.getElementById('back-to-top');
window.addEventListener('scroll',()=>{
  window.scrollY>300?backBtn.classList.add('visible'):backBtn.classList.remove('visible');
});
backBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

/* ------------------------------------------------------------------
   CONTACT FORM (fake ajax)
------------------------------------------------------------------ */
document.getElementById('contact-form').addEventListener('submit',e=>{
  e.preventDefault();
  const status=document.getElementById('form-status');
  status.textContent='Sending…';
  setTimeout(()=>{status.textContent='Message sent!';e.target.reset();},1500);
});

/* ------------------------------------------------------------------
   FETCH POSTS + BUILD SEARCH INDEX
------------------------------------------------------------------ */
fetch(POSTS_JSON)
  .then(r=>r.json())
  .then(json=>{
    posts=json;
    buildLunr();
    buildTagChips();
    renderPage();     // first render
  })
  .catch(err=>console.error('posts.json missing?',err));

function buildLunr(){
  lunrIndex = lunr(function(){
    this.ref('id'); this.field('title'); this.field('excerpt'); this.field('tags');
    posts.forEach(p=>this.add(p));
  });
}

/* ------------------------------------------------------------------
   SEARCH + TAG FILTER EVENTS
------------------------------------------------------------------ */
const searchInput=document.getElementById('search-input');
const clearBtn=document.getElementById('clear-filter');
searchInput.addEventListener('input',()=>{page=1;renderPage();});
clearBtn.addEventListener('click',()=>{currentTag='';clearBtn.classList.add('hidden');page=1;renderPage();});
function buildTagChips(){
  const wrap=document.getElementById('tag-chips');
  const tags=[...new Set(posts.flatMap(p=>p.tags))].sort();
  tags.forEach(tag=>{
    const btn=document.createElement('button');
    btn.textContent=tag;
    btn.addEventListener('click',()=>{
      currentTag = currentTag===tag ? '' : tag;
      [...wrap.children].forEach(b=>b.classList.remove('active'));
      if(currentTag){btn.classList.add('active');clearBtn.classList.remove('hidden');}
      else{clearBtn.classList.add('hidden');}
      page=1;renderPage();
    });
    wrap.appendChild(btn);
  });
}

/* ------------------------------------------------------------------
   RENDER LOGIC (pagination + filters + search)
------------------------------------------------------------------ */
const grid=document.getElementById('posts-grid');
const pager=document.getElementById('pagination');
const sentinel=document.getElementById('sentinel');

function filterPosts(){
  let list=[...posts];
  // tag filter
  if(currentTag){list=list.filter(p=>p.tags.includes(currentTag));}
  // search
  const q=searchInput.value.trim();
  if(q){
    const hits=lunrIndex.search(q);
    const ids=new Set(hits.map(h=>parseInt(h.ref)));
    list=list.filter(p=>ids.has(p.id));
  }
  return list;
}

function renderPage(){
  const list=filterPosts();
  const start=(page-1)*POSTS_PER_PAGE;
  const end=start+POSTS_PER_PAGE;
  const slice=list.slice(0,end);

  grid.innerHTML='';
  slice.forEach(buildCard);

  // pagination buttons (for no‑JS fallback the URL can include ?page=n)
  pager.innerHTML='';
  if(page>1){pager.appendChild(pageLink('« Newer',page-1,'prev'));}
  if(end<list.length){pager.appendChild(pageLink('Older »',page+1,'next'));}

  // if infinite scroll – observe sentinel only when more data to load
  if(end<list.length){ioScroll.observe(sentinel);}else{ioScroll.unobserve(sentinel);}
}

function buildCard(p){
  const article=document.createElement('article');
  article.className='post-card lazy';
  article.innerHTML=`
    <a href="${p.url || '#'}">
      <div class="post-thumbnail"><img data-src="${p.thumb}" alt="${p.title}" class="lazy-img skeleton"></div>
      <div class="post-content">
        <h2 class="post-title">${p.title}</h2>
        <p class="post-excerpt">${p.excerpt}</p>
        <span class="post-meta">${p.date} • ${p.read} min read</span>
      </div>
    </a>`;
  grid.appendChild(article);
  ioLazy.observe(article.querySelector('.lazy-img'));
}

function pageLink(text,n,cls){
  const a=document.createElement('a');a.href='#';a.textContent=text;a.className=cls;
  a.addEventListener('click',e=>{e.preventDefault();page=n;renderPage();});
  return a;
}

/* ------------------------------------------------------------------
   INTERSECTION OBSERVERS
------------------------------------------------------------------ */
// 1) Lazy‑load images
const ioLazy=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const img=entry.target;
      img.src=img.dataset.src;
      img.onload=()=>img.classList.remove('skeleton');
      ioLazy.unobserve(img);
    }
  });
},{threshold:LAZY_THRESHOLD});

// 2) Infinite scroll sentinel
const ioScroll=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      page++;renderPage();
    }
  });
},{rootMargin:'400px'}); // preload earlier

/* ------------------------------------------------------------------
   MISC
------------------------------------------------------------------ */
document.getElementById('year').textContent=new Date().getFullYear();
</script>

[
  {

    "date":"May 01 2025",

    "url":"/posts/matrix-rain.html"
  },
  ...
]

<!-- ------------- sw.js (save as /sw.js) -------------
const CACHE = 'cbx-v1';
const OFFLINE = '/offline.html';
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll([
    '/',OFFLINE,'/posts.json'
  ])));
});
self.addEventListener('fetch',e=>{
  e.respondWith(
    caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(OFFLINE)))
  );
});
------------------------------------------------------>

</body>
</html>
