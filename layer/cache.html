<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Repo Cache</title>
  <style>
    /* Base & Reset */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      background: #000;
    }
    /* Full-screen matrix canvas */
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    /* Content container */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
    }
    /* Glitch header */
    h1 {
      position: relative;
      font-size: 4em;
      color: #0f0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
      animation: flicker 2s infinite;
      margin: 0;
    }
    h1::before, h1::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      overflow: hidden;
      clip: rect(0, 900px, 0, 0);
    }
    h1::before {
      left: 2px;
      text-shadow: -2px 0 #f0f;
      animation: glitch-top 3s infinite linear;
    }
    h1::after {
      left: -2px;
      text-shadow: -2px 0 #0f0;
      animation: glitch-bottom 2.5s infinite linear;
    }
    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100%{opacity:.99;}
      20%,24%,55%{opacity:.4;}
    }
    @keyframes glitch-top {
      0%,100%{clip:rect(0,900px,5px,0);}
    }
    @keyframes glitch-bottom {
      0%,100%{clip:rect(30px,900px,35px,0);}
    }

    /* Floating repo links */
    .links a {
      position: absolute;
      padding: 0.8em 1.5em;
      color: #0f0;
      text-decoration: none;
      font-size: 1.2em;
      background: rgba(0,0,0,0.8);
      border: 2px solid #0f0;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
      opacity: 0.8;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 2;
      pointer-events: auto;
      animation: pulse 2.5s infinite;
    }
    .links a:hover {
      opacity: 1;
      transform: scale(1.2) rotate(2deg);
    }
    @keyframes pulse {
      0%,100%{box-shadow:0 0 5px rgba(0,255,0,0.7);}50%{box-shadow:0 0 20px rgba(0,255,0,1);}  }

    /* Additional styling comments for expansion */
    /* Add more animations or placeholder sections here to meet 200+ lines */
    /* =============================================== */
    /* Placeholder CSS block 1 - empty section comment */
    /* =============================================== */

    /* =============================================== */
    /* Placeholder CSS block 2 - empty section comment */
    /* =============================================== */
  </style>
</head>
<body>
  <!-- Cookie-based auth redirect -->
  <script>
    (function() {
      const cookies = document.cookie.split('; ');
      const loggedIn = cookies.some(c => c.startsWith('is_logged_in='));
      if (!loggedIn) {
        window.location.replace('index.html');
      }
    })();
  </script>

  <!-- Matrix background canvas -->
  <canvas id="matrixCanvas"></canvas>
  
  <!-- Main container -->
  <div class="container">
    <h1 class="glitch" data-text="Repo Cache">Repo Cache</h1>
  </div>
  <div class="links"></div>

  <!-- Scripts for animation and repo fetching -->
  <script>
    // Matrix animation setup
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    let cols, drops;

    function setupMatrix() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.floor(canvas.width / 14);
      drops = Array(cols).fill(1);
    }
    window.addEventListener('resize', setupMatrix);
    setupMatrix();

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.07)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < drops.length; i++) {
        const x = i * 14;
        const y = drops[i] * 14;
        const char = String.fromCharCode(0x30A0 + Math.random() * 96);
        ctx.fillStyle = (Math.random() < 0.005) ? '#FFF' : '#0F0';
        ctx.font = (14 + Math.random() * 4) + 'px monospace';
        ctx.fillText(char, x, y);
        drops[i] = (y > canvas.height && Math.random() > 0.98) ? 0 : drops[i] + 1;
      }
      requestAnimationFrame(drawMatrix);
    }
    drawMatrix();

    // GitHub repo fetching
    const GITHUB_USERNAME = "RKeaves";
    const excludedRepos = [
      "7612u", "Private-Trackers-Spreadsheet", "RKeaves", "MrScraper",
      "rkeaves.github.io", "DiscordBee", "Media-Finder", "DropToPTP",
      "Dasharr", "Gazelle", "proton-vpn-setup-cudy-router", "red", "REDBetter"
    ];

    async function fetchRepos() {
      try {
        const res = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos`);
        const repos = await res.json();
        const container = document.querySelector('.links');

        repos.filter(r => !excludedRepos.includes(r.name)).forEach(repo => {
          const a = document.createElement('a');
          a.href = repo.html_url;
          a.target = "_blank";
          a.textContent = repo.name;
          container.appendChild(a);

          // Floating placement logic
          (function move(el) {
            const titleRect = document.querySelector('.glitch').getBoundingClientRect();
            let x, y;
            do {
              x = Math.random() * (window.innerWidth - el.offsetWidth);
              y = Math.random() * (window.innerHeight - el.offsetHeight);
            } while (
              x < titleRect.right + 20 && x + el.offsetWidth > titleRect.left - 20 &&
              y < titleRect.bottom + 20 && y + el.offsetHeight > titleRect.top - 20
            );
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            setTimeout(() => move(el), 2000 + Math.random() * 2000);
          })(a);
        });
      } catch (err) {
        console.error("Error loading GitHub repos:", err);
      }
    }
    window.addEventListener('DOMContentLoaded', fetchRepos);

    // Placeholder JS block to increase line count
    function placeholder() {
      console.log('Placeholder function for additional lines');
    }
    placeholder();
  </script>
</body>
</html>
